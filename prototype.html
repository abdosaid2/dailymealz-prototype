<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>Dailymealz — Interactive Prototype</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;background:#EFEDDF;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:#F7F6EE;border-bottom:1px solid #E4E1D0;flex:none;z-index:5}
.topbar .brand{font-weight:800;font-size:14px;color:#1F261E;white-space:nowrap}
.topbar .brand i{color:#12B566;font-style:normal}
.topbar select{font-family:inherit;font-size:13px;padding:7px 9px;border:1px solid #CFCDB4;border-radius:10px;background:#fff;color:#1F261E;max-width:44vw}
.topbar .btn{border:1px solid #CFCDB4;background:#fff;border-radius:10px;padding:7px 11px;font-size:13px;cursor:pointer;color:#1F261E;white-space:nowrap}
.topbar .btn:hover{background:#E9F9F0;border-color:#12B566}
.topbar .btn:disabled{opacity:.4;cursor:default}
.topbar .btn.ar{font-weight:700}
.topbar .spacer{flex:1}
.topbar .fb{background:#12B566;color:#06220f;border:none;font-weight:700;text-decoration:none;border-radius:10px;padding:8px 13px;font-size:13px;white-space:nowrap}
.stage{flex:1;position:relative;overflow:hidden}
/* the phone is rendered at native size then scaled to fit via JS transform */
.phone{position:absolute;top:50%;left:50%;width:408px;height:862px;background:#000;border-radius:46px;padding:9px;box-shadow:0 24px 60px rgba(31,38,30,.35);transform-origin:center center}
.phone .notch{position:absolute;top:9px;left:50%;margin-left:-60px;width:120px;height:26px;background:#000;border-radius:0 0 16px 16px;z-index:2}
.phone iframe{width:390px;height:844px;border:0;border-radius:37px;background:#F7F6EE;display:block}
.hint{flex:none;font-size:11px;color:#8E9C89;padding:6px 16px;text-align:center;background:#F7F6EE;border-top:1px solid #E4E1D0}
@media (max-width:600px){
  .topbar{padding:7px 9px;gap:5px}
  .topbar .brand{display:none}
  .hint{display:none}
}
</style>
</head>
<body>
<div class="topbar">
  <span class="brand">dailymealz<i>.</i></span>
  <button class="btn" id="back" title="Back">‹</button>
  <select id="jump"></select>
  <button class="btn ar" id="lang" title="Switch language">عربي</button>
  <span class="spacer"></span>
  <a class="fb" href="mailto:asm2345@gmail.com?subject=Dailymealz%20prototype%20feedback">Feedback</a>
</div>
<div class="stage" id="stage">
  <div class="phone" id="phone"><div class="notch"></div><iframe id="screen" title="Prototype screen"></iframe></div>
</div>
<div class="hint">Tap inside the phone to move between screens · use the menu to jump · عربي switches language where available</div>
<script>
const SCREENS=[
 ["— New customer journey —",null],
 ["Opening","ui_kits/app-green/onboarding.html"],
 ["Login (OTP)","ui_kits/app-green/auth-login.html"],
 ["Account recovery","ui_kits/app-green/auth-recovery.html"],
 ["Delivery location","ui_kits/app-green/location-address.html"],
 ["Home & plans","ui_kits/app-green/home-plans.html"],
 ["Plan details","ui_kits/app-green/plan-details.html"],
 ["Calorie calculator","ui_kits/app-green/calorie-calculator.html"],
 ["Pick your meals","ui_kits/app-green/meal-selection-calendar.html"],
 ["Meal details","ui_kits/app-green/meal-details.html"],
 ["Review meals","ui_kits/app-green/review-meals.html"],
 ["Cart & payment","ui_kits/app-green/cart-checkout.html"],
 ["Saved cards / CVV / 3DS","ui_kits/app-green/payment-cards.html"],
 ["— Everyday use —",null],
 ["Subscription dashboard","ui_kits/app-green/subscription-dashboard.html"],
 ["Pause / renew / skip","ui_kits/app-green/subscription-manage.html"],
 ["History & past meals","ui_kits/app-green/subscription-history.html"],
 ["Rate a meal","ui_kits/app-green/rating-flow.html"],
 ["Account, wallet & rewards","ui_kits/app-green/account-wallet.html"],
 ["Daily calorie target","ui_kits/app-green/nutrition-target.html"],
 ["Dietary preferences","ui_kits/app-green/dietary-preferences.html"],
 ["Nutrition consultation","ui_kits/app-green/consultation-booking.html"],
 ["System states","ui_kits/app-green/system-states.html"],
 ["— For companies (B2B) —",null],
 ["Employee setup","ui_kits/app-green/b2b-setup.html"],
 ["Weekly office meals","ui_kits/app-green/b2b-recurring.html"],
 ["Order by the day","ui_kits/app-green/b2b-open.html"],
 ["Your company","ui_kits/app-green/b2b-org-info.html"],
 ["Catering inquiry","ui_kits/app-green/catering-inquiry.html"],
 ["— Mealz · AI concept —",null],
 ["Tell Mealz about you","ui_kits/app-ai/onboarding-intake.html"],
 ["Your week, drafted","ui_kits/app-ai/week-draft-review.html"],
 ["Daily brief","ui_kits/app-ai/daily-brief.html"],
 ["“I'm traveling Thursday”","ui_kits/app-ai/swap-conversation.html"],
 ["Nutrition coach","ui_kits/app-ai/nutrition-coach.html"],
];
const HAS_AR=new Set([
 "ui_kits/app-green/onboarding.html","ui_kits/app-green/auth-login.html","ui_kits/app-green/location-address.html",
 "ui_kits/app-green/home-plans.html","ui_kits/app-green/plan-details.html","ui_kits/app-green/calorie-calculator.html",
 "ui_kits/app-green/meal-selection-calendar.html","ui_kits/app-green/meal-details.html","ui_kits/app-green/cart-checkout.html",
 "ui_kits/app-green/subscription-dashboard.html","ui_kits/app-green/subscription-manage.html","ui_kits/app-green/account-wallet.html",
 "ui_kits/app-green/rating-flow.html","ui_kits/app-green/b2b-recurring.html","ui_kits/app-green/system-states.html",
 "ui_kits/app-ai/daily-brief.html"
]);
const frame=document.getElementById('screen'),jump=document.getElementById('jump'),
      back=document.getElementById('back'),lang=document.getElementById('lang'),
      phone=document.getElementById('phone'),stage=document.getElementById('stage');
SCREENS.forEach(([label,path])=>{
  const o=document.createElement('option');
  o.textContent=label; if(path)o.value=path; else{o.disabled=true;o.style.fontWeight='700';}
  jump.appendChild(o);
});
// deep-link: ?s=<path> lets the landing page open a specific screen inside the frame
const params=new URLSearchParams(location.search);
const start=params.get('s');
// accept a listed screen or its -ar twin; reject anything else (path-safety)
const startBase=start&&start.replace(/-ar\.html$/,'.html');
const valid=start&&/^ui_kits\/app-(green|ai)\/[a-z0-9-]+\.html$/.test(start)&&SCREENS.some(([l,p])=>p===startBase);
frame.src=valid?start:"ui_kits/app-green/onboarding.html";
// scale the 408x862 phone to fit the stage on any device
function fit(){
  const pad=window.innerWidth<600?8:20;
  const s=Math.min((stage.clientWidth-pad)/408,(stage.clientHeight-pad)/862);
  phone.style.transform='translate(-50%,-50%) scale('+s+')';
}
window.addEventListener('resize',fit); fit();
function currentPath(){
  try{return frame.contentWindow.location.pathname.replace(/^.*?(ui_kits\/.*)$/,'$1');}catch(e){return null;}
}
function baseOf(p){return p?p.replace(/-ar\.html$/,'.html'):null;}
frame.addEventListener('load',()=>{
  const p=currentPath(); if(!p)return;
  const b=baseOf(p);
  if([...jump.options].some(o=>o.value===b)) jump.value=b;
  const isAr=/-ar\.html$/.test(p);
  lang.textContent=isAr?'EN':'عربي';
  lang.disabled=!isAr&&!HAS_AR.has(b);
});
jump.addEventListener('change',()=>{frame.src=jump.value;});
back.addEventListener('click',()=>{try{frame.contentWindow.history.back();}catch(e){}});
lang.addEventListener('click',()=>{
  const p=currentPath(); if(!p)return;
  frame.src=/-ar\.html$/.test(p)?p.replace(/-ar\.html$/,'.html'):p.replace(/\.html$/,'-ar.html');
});
</script>
</body>
</html>
