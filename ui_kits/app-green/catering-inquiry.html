<style>
html,body{height:100%}

<body data-screen-label="Catering & Business Inquiry (Green)"><div id="root"></div>
<script type="text/babel">

function App(){

  const [size,setSize]=React.useState('20–50');

  return <div className="app">

      :<div data-screen-label="Inquiry form">

          {[['340+','companies served'],['26','partner kitchens'],['12:15','avg office drop-off']].map(([v,l])=><div key={l} style={{flex:1,background:'var(--dm-surface)',border:'1px solid var(--dm-line)',borderRadius:'var(--r-card)',boxShadow:'var(--sh-1)',padding:'11px 6px',textAlign:'center'}}>
