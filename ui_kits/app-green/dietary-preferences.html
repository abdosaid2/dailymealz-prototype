<!-- @dsCard group="App Screens (Green)" viewport="390x844" name="Dietary Preferences" subtitle="Styles + exclusions with a live meal counter — including the filtered-to-zero recovery state" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dailymealz — Dietary preferences</title>
<link rel="stylesheet" href="../../styles-green.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
html,body{height:100%}
body{width:390px;height:844px;margin:0 auto;overflow:hidden}
#root,.app{height:100%;display:flex;flex-direction:column;position:relative}
.scroll{flex:1;overflow-y:auto;padding:0 20px 120px;scrollbar-width:none}
.scroll::-webkit-scrollbar{display:none}
.micro{font:600 var(--fs-micro)/var(--lh-micro) var(--font-ui);letter-spacing:.06em;text-transform:uppercase;color:var(--dm-ink-3)}
</style></head>
<body data-screen-label="Dietary Preferences (Green)"><div id="root"></div>
<script type="text/babel">
const {Button,Chip}=window.DailymealzAppRedesignBrief_310f67;
const STYLES=['Everything','High protein','Low carb','Vegetarian','Vegan'];
const EXCL=[['Shellfish',3],['Nuts',4],['Dairy',6],['Gluten',7],['Beef',4],['Spicy',3]];
const TOTAL=24;
function App(){
  const [style,setStyle]=React.useState('Everything');
  const [ex,setEx]=React.useState(['Shellfish']);
  const styleCost={'Everything':0,'High protein':6,'Low carb':8,'Vegetarian':13,'Vegan':17}[style];
  const left=Math.max(0,TOTAL-styleCost-ex.reduce((s,e)=>s+(EXCL.find(x=>x[0]===e)?.[1]||0),0));
  const toggle=e=>setEx(ex.includes(e)?ex.filter(x=>x!==e):[...ex,e]);
  const zero=left===0;
  return <div className="app">
    <div style={{display:'flex',gap:12,alignItems:'center',padding:'18px 20px 8px'}}>
      <a href="./account-wallet.html" aria-label="Back" style={{width:44,height:44,borderRadius:'50%',border:'1.5px solid var(--dm-line-strong)',background:'var(--dm-surface)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--dm-ink)',flex:'none'}}><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.5 4.5 7 10l5.5 5.5"/></svg></a>
      <div style={{flex:1}}>
        <h1 style={{margin:0,font:'600 21px/26px var(--font-display)'}}>Dietary preferences</h1>
        <span style={{font:'400 var(--fs-caption)/var(--lh-caption) var(--font-ui)',color:'var(--dm-ink-2)'}}>Filters every menu on plans with filtration</span>
      </div>
    </div>
    <div className="scroll">
      <span className="micro" style={{display:'block',margin:'12px 0 8px'}}>Eating style</span>
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        {STYLES.map(s=><Chip key={s} selected={style===s} onClick={()=>setStyle(s)}>{s}</Chip>)}
      </div>
      <span className="micro" style={{display:'block',margin:'18px 0 8px'}}>Never serve me</span>
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        {EXCL.map(([e])=><Chip key={e} selected={ex.includes(e)} onClick={()=>toggle(e)}>{e}</Chip>)}
      </div>
      <span style={{display:'block',margin:'14px 2px 0',font:'400 11.5px/16px var(--font-ui)',color:'var(--dm-ink-3)'}}>Allergies are hard filters — kitchens never see your name, only the rule. Menus show a "filtered by your preferences" chip you can clear anytime.</span>
      {!zero&&<div style={{marginTop:16,background:'var(--dm-surface)',border:'1px solid var(--dm-line)',borderRadius:'var(--r-card)',boxShadow:'var(--sh-1)',padding:'13px 16px'}} data-screen-label="Live meal counter">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
          <span className="micro">This week on Balanced</span>
          <b style={{font:'700 15px var(--font-display)',fontVariantNumeric:'tabular-nums'}}>{left} of {TOTAL} meals fit</b>
        </div>
        <div style={{height:7,borderRadius:4,background:'var(--dm-sand)',marginTop:8,overflow:'hidden'}}><i style={{display:'block',height:'100%',width:(left/TOTAL*100)+'%',borderRadius:4,background:left<6?'var(--dm-amber-500)':'var(--dm-green-500)',transition:'width .3s var(--ease-serve)'}}/></div>
        {left<6&&<span style={{display:'block',marginTop:7,font:'500 11.5px/15px var(--font-ui)',color:'var(--dm-amber-700)'}}>Getting narrow — some days may repeat dishes.</span>}
      </div>}
      {zero&&<div style={{marginTop:16,background:'var(--dm-terra-100)',borderRadius:'var(--r-card)',padding:'14px 16px'}} role="alert" data-screen-label="Zero meals — recovery">
        <b style={{font:'700 15px/19px var(--font-display)',color:'var(--dm-terra-700)'}}>That combination filters out every meal</b>
        <span style={{display:'block',font:'400 12px/17px var(--font-ui)',color:'var(--dm-ink-2)',margin:'4px 0 12px'}}>Nothing on this week's menus fits {style.toLowerCase()} plus {ex.length} exclusions. Loosen one thing and dishes come back:</span>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <Button variant="secondary" size="sm" onClick={()=>setEx(ex.slice(0,-1))}>Drop "{ex[ex.length-1]}"</Button>
          <Button variant="ghost" size="sm" onClick={()=>setStyle('Everything')}>Relax eating style</Button>
        </div>
      </div>}
    </div>
    <div style={{position:'absolute',insetInline:0,bottom:0,padding:'12px 20px 26px',background:'rgba(247,246,238,.9)',backdropFilter:'blur(14px)',borderTop:'1px solid var(--dm-line)'}}>
      <a href="./account-wallet.html" style={{display:'block'}}><Button block size="lg" disabled={zero} style={{width:'100%'}}>{zero?'Loosen a filter to save':'Save preferences'}</Button></a>
    </div>
  </div>;}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
