<!-- @dsCard group="App Screens (Green)" viewport="390x844" name="Home — Brand Green" subtitle="Discovery feed under the brand green: sage bone neutrals, ink-on-green CTAs" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dailymealz — Home</title>
<link rel="stylesheet" href="../../styles-green.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
html,body{height:100%}
body{width:390px;height:844px;margin:0 auto;overflow:hidden}
#root,.app{height:100%;display:flex;flex-direction:column;position:relative}
.scroll{flex:1;overflow-y:auto;scrollbar-width:none}
.scroll::-webkit-scrollbar{display:none}
.hstrip{display:flex;gap:8px;overflow-x:auto;padding:0 20px;scrollbar-width:none}
.hstrip::-webkit-scrollbar{display:none}
.micro{font:600 var(--fs-micro)/var(--lh-micro) var(--font-ui);letter-spacing:.06em;text-transform:uppercase;color:var(--dm-ink-3)}
.sk{background:var(--dm-sand);border-radius:12px;animation:shimmer 1.1s infinite}
@keyframes shimmer{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes sheetUp{from{transform:translateY(70px);opacity:0}to{transform:none;opacity:1}}
</style></head>
<body data-screen-label="Home & Plan Discovery (Green)"><div id="root"></div>
<script type="text/babel">
const {Button,Chip,TabBar}=window.DailymealzAppRedesignBrief_310f67;
const PLANS=[
{name:'Balanced',sub:'Lunch · Sun–Thu · rotating multi-menu',meals:20,per:38,total:760,tags:['Multi-menu','Friday off'],pick:true,note:'photo · mixed tray, overhead'},
{name:'Light',sub:'Under 550 kcal · built from your calorie target',meals:20,per:42,total:840,tags:['Calorie-matched'],calc:true,note:'photo · salad bowl, side light'},
{name:'Executive',sub:'Premium mains · chef specials weekly',meals:12,per:56,total:672,tags:['Premium meals','Friday delivery'],note:'photo · plated main, close crop'}];
const CATS=[['Balanced','bowl'],['High protein','grill'],['Low carb','greens'],['Vegan','plant'],['Chef’s table','plated']];
function StatusBar(){return <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 24px 6px',font:'600 14px var(--font-ui)'}}>
  <span>12:04</span>
  <span style={{display:'flex',gap:5,alignItems:'center'}}>
    <span style={{display:'flex',gap:1.5,alignItems:'flex-end'}}>{[4,6,8,10].map(h=><i key={h} style={{width:3,height:h,background:'var(--dm-ink)',borderRadius:1}}/>)}</span>
    <i style={{width:22,height:11,border:'1.5px solid var(--dm-ink)',borderRadius:3.5,display:'inline-flex',padding:1.5}}><i style={{width:'72%',background:'var(--dm-ink)',borderRadius:1.5}}/></i>
  </span></div>;}
function IconBtn({label,href,children,badge}){return <a href={href} aria-label={label} style={{position:'relative',width:44,height:44,borderRadius:'50%',border:'1.5px solid var(--dm-line-strong)',background:'var(--dm-surface)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--dm-ink)',flex:'none'}}>
  {children}{badge&&<i style={{position:'absolute',top:2,insetInlineEnd:2,width:10,height:10,borderRadius:'50%',background:'var(--dm-saffron-500)',border:'2px solid var(--dm-surface)'}}/>}</a>;}
function Skeleton(){return <div style={{padding:'6px 20px'}}>
  <div className="sk" style={{height:120,borderRadius:'var(--r-card)'}}/>
  <div style={{display:'flex',gap:10,marginTop:16}}>{[0,1,2,3].map(i=><div key={i} className="sk" style={{width:64,height:84,animationDelay:i*120+'ms'}}/>)}</div>
  <div className="sk" style={{height:230,borderRadius:'var(--r-card)',marginTop:16}}/>
  <div className="sk" style={{height:230,borderRadius:'var(--r-card)',marginTop:12,animationDelay:'200ms'}}/>
</div>;}
function Stars({val,set}){return <div style={{display:'flex',gap:2}}>{[1,2,3,4,5].map(i=><button key={i} onClick={()=>set(i)} style={{appearance:'none',border:0,background:'none',cursor:'pointer',fontSize:26,lineHeight:1,padding:'2px 3px',color:i<=val?'var(--dm-saffron-500)':'var(--dm-sand-2)'}}>★</button>)}</div>;}
function PlanCard({p,i}){return <a href="./plan-details.html" style={{display:'block',color:'var(--dm-ink)',background:'var(--dm-surface)',border:'1px solid var(--dm-line)',borderRadius:'var(--r-card)',boxShadow:'var(--sh-1)',overflow:'hidden',marginTop:12,animation:`dm-serve var(--dur-serve) var(--ease-serve) ${i*40}ms both`}}>
  <div className="dm-photo" style={{height:150,borderRadius:0,position:'relative'}}>
    <span className="dm-photo-note">{p.note}</span>
    {p.pick&&<span style={{position:'absolute',top:10,insetInlineStart:10,zIndex:2,background:'var(--dm-green-100)',color:'var(--dm-green-700)',borderRadius:'var(--r-pill)',padding:'4px 11px',font:'700 11px var(--font-ui)'}}>Most picked</span>}
    {p.calc&&<span style={{position:'absolute',top:10,insetInlineStart:10,zIndex:2,background:'var(--dm-teal-100)',color:'var(--dm-teal-700)',borderRadius:'var(--r-pill)',padding:'4px 11px',font:'700 11px var(--font-ui)'}}>Starts with your calorie target</span>}
  </div>
  <div style={{padding:'13px 15px 15px'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:10}}>
      <div style={{minWidth:0}}>
        <b style={{font:'700 19px/24px var(--font-display)'}}>{p.name}</b>
        <span style={{display:'block',font:'400 12px/16px var(--font-ui)',color:'var(--dm-ink-2)'}}>{p.sub}</span>
      </div>
      <div style={{textAlign:'end',flex:'none'}}>
        <b style={{font:'700 22px/24px var(--font-display)'}}>{p.per}</b><span style={{font:'600 11px var(--font-ui)',color:'var(--dm-ink-2)'}}> SAR/meal</span>
        <span style={{display:'block',font:'400 11px var(--font-ui)',color:'var(--dm-ink-3)'}}>{p.meals} lunches · {p.total} SAR</span>
      </div>
    </div>
    <div style={{display:'flex',gap:6,marginTop:10,flexWrap:'wrap',alignItems:'center'}}>
      {p.tags.map(t=><span key={t} style={{background:'var(--dm-sand)',borderRadius:'var(--r-pill)',padding:'4px 10px',font:'600 11px var(--font-ui)',color:'var(--dm-ink-2)'}}>{t}</span>)}
      <span style={{font:'500 11px var(--font-ui)',color:'var(--dm-teal-700)'}}>or 4 × {Math.round(p.total/4)} SAR with Tamara</span>
    </div>
  </div></a>;}
function App(){
  const [loaded,setLoaded]=React.useState(false);
  const [rate,setRate]=React.useState(false);
  const [meal,setMeal]=React.useState(0);const [svc,setSvc]=React.useState(0);
  const [ptype,setPtype]=React.useState('plans');
  const [filter,setFilter]=React.useState('all');
  React.useEffect(()=>{const a=setTimeout(()=>setLoaded(true),1000);const b=setTimeout(()=>setRate(true),2400);return()=>{clearTimeout(a);clearTimeout(b)};},[]);
  const nav=t=>{if(t==='subs')location.href='./subscription-dashboard.html';if(t==='biz')location.href='./catering-inquiry.html';if(t==='account')location.href='./account-wallet.html';};
  return <div className="app">
    <div className="dm-dots" style={{paddingBottom:12}}>
      <StatusBar/>
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'8px 20px 0'}}>
        <a href="./location-address.html" style={{flex:1,minWidth:0,display:'flex',alignItems:'center',gap:8,color:'var(--dm-ink)'}}>
          <div style={{width:36,height:36,borderRadius:'50%',background:'var(--dm-saffron-100)',display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}><i style={{width:11,height:11,borderRadius:'50%',background:'var(--dm-saffron-600)'}}/></div>
          <span style={{minWidth:0}}>
            <span className="micro" style={{display:'block'}}>Deliver to</span>
            <b style={{font:'600 14.5px var(--font-display)',whiteSpace:'nowrap'}}>Olaya office <svg width="11" height="11" viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" style={{display:'inline'}}><path d="m5 8 5 5 5-5"/></svg></b>
          </span>
        </a>
        <IconBtn label="Support" href="#chat"><span style={{display:'flex',gap:3}}>{[0,1,2].map(i=><i key={i} style={{width:4,height:4,borderRadius:'50%',background:'var(--dm-ink-2)'}}/>)}</span></IconBtn>
        <IconBtn label="Cart" href="./cart-checkout.html" badge>
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M4 7h16l-1.5 12a2 2 0 0 1-2 1.8h-9A2 2 0 0 1 5.5 19L4 7z"/><path d="M8.5 10V6a3.5 3.5 0 0 1 7 0v4"/></svg>
        </IconBtn>
      </div>
    </div>
    {!loaded?<div className="scroll" data-screen-label="Loading skeletons"><Skeleton/></div>
    :<div className="scroll" data-screen-label="Home feed">
      <div className="hstrip" style={{paddingTop:4,scrollSnapType:'x mandatory'}}>
        <div style={{flex:'none',width:310,scrollSnapAlign:'start',background:'var(--dm-saffron-100)',borderRadius:'var(--r-card)',padding:'16px 18px',display:'flex',flexDirection:'column',gap:4,animation:'dm-serve var(--dur-serve) var(--ease-serve) both'}}>
          <b style={{font:'700 18px/22px var(--font-display)',color:'var(--dm-saffron-700)'}}>Ramadan boxes are open</b>
          <span style={{font:'400 12px/16px var(--font-ui)',color:'var(--dm-ink-2)'}}>Suhoor + iftar plans, delivered before maghrib.</span>
          <span style={{font:'700 12.5px var(--font-ui)',color:'var(--dm-saffron-700)',marginTop:4}}>See plans →</span>
        </div>
        <div style={{flex:'none',width:310,scrollSnapAlign:'start',background:'var(--dm-teal-100)',borderRadius:'var(--r-card)',padding:'16px 18px',display:'flex',flexDirection:'column',gap:4}}>
          <b style={{font:'700 18px/22px var(--font-display)',color:'var(--dm-teal-700)'}}>Bring a friend to the sufra</b>
          <span style={{font:'400 12px/16px var(--font-ui)',color:'var(--dm-ink-2)'}}>You both get 30 points when they subscribe.</span>
          <span style={{font:'700 12.5px var(--font-ui)',color:'var(--dm-teal-700)',marginTop:4}}>Share your code →</span>
        </div>
      </div>
      <div className="hstrip" style={{marginTop:14}}>
        {[['plans','Meal plans'],['catering','Office catering']].map(([k,l])=><Chip key={k} selected={ptype===k} onClick={()=>setPtype(k)}>{l}</Chip>)}
      </div>
      <div className="hstrip" style={{marginTop:16,gap:14}}>
        {CATS.map(([c,n],i)=><a key={c} href="#cat" onClick={e=>e.preventDefault()} style={{flex:'none',display:'flex',flexDirection:'column',alignItems:'center',gap:6,width:66,color:'var(--dm-ink)'}}>
          <div className="dm-photo" style={{width:60,height:60,borderRadius:'50%'}}><span className="dm-photo-note" style={{fontSize:6.5}}>{n}</span></div>
          <span style={{font:'600 11px var(--font-ui)',textAlign:'center',lineHeight:'13px'}}>{c}</span>
        </a>)}
      </div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',margin:'20px 20px 0'}}>
        <span className="micro">Plans in Al Olaya</span>
        <a href="#filters" onClick={e=>e.preventDefault()} style={{font:'600 12px var(--font-ui)'}}>All filters</a>
      </div>
      <div className="hstrip" style={{marginTop:10}}>
        {[['all','All'],['light','Under 550 kcal'],['protein','High protein'],['premium','Premium'],['friday','Friday delivery']].map(([k,l])=><Chip key={k} selected={filter===k} onClick={()=>setFilter(k)} style={{flex:'none'}}>{l}</Chip>)}
      </div>
      <div style={{padding:'0 20px'}}>
        {PLANS.filter(p=>filter==='all'||(filter==='light'&&p.calc)||(filter==='protein'&&p.name==='Balanced')||(filter==='premium'&&p.tags.includes('Premium meals'))||(filter==='friday'&&p.tags.includes('Friday delivery'))).map((p,i)=><PlanCard key={p.name} p={p} i={i}/>)}
        <div style={{display:'flex',alignItems:'center',gap:10,marginTop:18}}>
          <span className="micro" style={{flex:'none'}}>26 partner kitchens</span><i style={{flex:1,height:1,background:'var(--dm-line)'}}/>
        </div>
        <div style={{display:'flex',gap:8,marginTop:10}}>
          {['Wafra','Nabta','Zad','Lemona'].map(k=><div key={k} title={k} style={{width:44,height:44,borderRadius:'50%',background:'var(--dm-surface)',border:'1px solid var(--dm-line)',display:'flex',alignItems:'center',justifyContent:'center',font:'700 15px var(--font-display)',color:'var(--dm-ink-2)'}}>{k[0]}</div>)}
          <div style={{width:44,height:44,borderRadius:'50%',background:'var(--dm-sand)',display:'flex',alignItems:'center',justifyContent:'center',font:'600 11px var(--font-ui)',color:'var(--dm-ink-2)'}}>+22</div>
        </div>
        <div style={{background:'var(--dm-wheat-100)',borderRadius:'var(--r-card)',padding:'13px 16px',marginTop:16,display:'flex',justifyContent:'space-between',alignItems:'center',gap:10}}>
          <div><b style={{font:'600 14px/18px var(--font-display)',color:'var(--dm-wheat-700)'}}>SNB cardholders: 15% off month one</b>
          <span style={{display:'block',font:'400 11px/15px var(--font-ui)',color:'var(--dm-ink-2)'}}>Applied automatically at checkout.</span></div>
          <span style={{font:'700 12px var(--font-ui)',color:'var(--dm-wheat-700)',flex:'none'}}>Details</span>
        </div>
        <div style={{background:'var(--dm-surface)',border:'1px solid var(--dm-line)',borderRadius:'var(--r-card)',boxShadow:'var(--sh-1)',padding:16,marginTop:12,display:'flex',gap:12,alignItems:'center'}}>
          <div style={{width:46,height:46,borderRadius:'50%',background:'var(--dm-teal-100)',display:'flex',alignItems:'center',justifyContent:'center',flex:'none',font:'700 17px var(--font-display)',color:'var(--dm-teal-700)'}}>Rx</div>
          <div style={{flex:1}}><b style={{font:'600 14.5px/18px var(--font-display)'}}>Not sure how much to eat?</b>
          <span style={{display:'block',font:'400 11.5px/15px var(--font-ui)',color:'var(--dm-ink-2)'}}>2-minute <a href="./calorie-calculator.html" style={{fontWeight:600}}>calorie calculator</a>, or a <a href="./consultation-booking.html" style={{fontWeight:600}}>dietitian consult</a> · 120 SAR.</span></div>
          <a href="./calorie-calculator.html" style={{flex:'none'}}><Button variant="secondary" size="sm">Start</Button></a>
        </div>
        <div style={{background:'var(--dm-ink)',borderRadius:'var(--r-card)',padding:'16px 18px',margin:'12px 0 24px',display:'flex',justifyContent:'space-between',alignItems:'center',gap:10}}>
          <div><b style={{font:'700 16px/20px var(--font-display)',color:'var(--dm-paper)'}}>Dailymealz at work</b>
          <span style={{display:'block',font:'400 11.5px/15px var(--font-ui)',color:'var(--dm-sand-2)'}}>Your company sponsors lunch — we bring the sufra.</span></div>
          <Button size="sm" style={{flex:'none'}}>Talk to us</Button>
        </div>
      </div>
    </div>}
    {rate&&<div style={{position:'absolute',inset:0,background:'rgba(38,31,21,.42)',zIndex:5}} data-screen-label="Rate last meal sheet">
      <div style={{position:'absolute',insetInline:0,bottom:0,background:'var(--dm-paper)',borderRadius:'var(--r-sheet) var(--r-sheet) 0 0',boxShadow:'var(--sh-3)',padding:'10px 24px 28px',animation:'sheetUp var(--dur-sheet) var(--ease-serve) both'}}>
        <div style={{width:40,height:4.5,borderRadius:'var(--r-pill)',background:'var(--dm-line-strong)',margin:'4px auto 14px'}}/>
        <div style={{display:'flex',gap:12,alignItems:'center'}}>
          <div className="dm-photo" style={{width:54,height:54,flex:'none'}}><span className="dm-photo-note" style={{fontSize:7}}>photo</span></div>
          <div><b style={{font:'700 17px/21px var(--font-display)'}}>How was yesterday’s Musakhan Roll?</b>
          <span style={{display:'block',font:'400 12px var(--font-ui)',color:'var(--dm-ink-2)'}}>Zad House · delivered 12:22</span></div>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:16}}><span style={{font:'600 13.5px var(--font-ui)'}}>The meal</span><Stars val={meal} set={setMeal}/></div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:8}}><span style={{font:'600 13.5px var(--font-ui)'}}>The delivery</span><Stars val={svc} set={setSvc}/></div>
        <div style={{display:'flex',gap:9,marginTop:18}}>
          <Button block size="lg" disabled={!meal&&!svc} onClick={()=>setRate(false)} style={{flex:1}}>Send rating</Button>
          <Button variant="ghost" size="lg" onClick={()=>setRate(false)}>Not now</Button>
        </div>
      </div>
    </div>}
    <TabBar active="home" onChange={nav}/>
  </div>;}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
