<!-- @dsCard group="App Screens (Green)" viewport="390x844" name="B2B — Open Ordering" subtitle="Day-by-day against the monthly allowance: primary Book-day action, unpicked & locked states, cut-off, exhausted rows" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dailymealz — Open ordering</title>
<link rel="stylesheet" href="../../styles-green.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
html,body{height:100%}
body{width:390px;height:844px;margin:0 auto;overflow:hidden}
#root,.app{height:100%;display:flex;flex-direction:column}
.scroll{flex:1;overflow-y:auto;padding:0 20px 90px;scrollbar-width:none}
.scroll::-webkit-scrollbar{display:none}
.card{background:var(--dm-surface);border:1px solid var(--dm-line);border-radius:var(--r-card);box-shadow:var(--sh-1)}
.micro{font:600 var(--fs-micro)/var(--lh-micro) var(--font-ui);letter-spacing:.06em;text-transform:uppercase;color:var(--dm-ink-3)}
</style></head>
<body data-screen-label="B2B Open Ordering (Green)"><div id="root"></div>
<script type="text/babel">
const {Button,TabBar}=window.DailymealzAppRedesignBrief_310f67;
const INIT=[
{wd:'Mon',dt:19,st:'locked',meal:'Grilled Salmon & Quinoa',k:'Nabta'},
{wd:'Tue',dt:20,st:'unpicked'},
{wd:'Wed',dt:21,st:'empty'},
{wd:'Thu',dt:22,st:'empty'}];
const USED_BEFORE=8; // lunches covered earlier in January
function LockIcon({s=10}){return <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" style={{flex:'none'}}><rect x="5" y="10.5" width="14" height="9.5" rx="2.5"/><path d="M8 10.5V7.5a4 4 0 0 1 8 0v3"/></svg>;}
function LockChip(){return <span style={{display:'inline-flex',alignItems:'center',gap:5,background:'var(--st-paused-bg)',color:'var(--st-paused-fg)',borderRadius:'var(--r-pill)',padding:'4px 10px',font:'600 10.5px var(--font-ui)',flex:'none'}}><LockIcon/>Locked</span>;}
function DayRow({wd,dt,tone,cell,title,titleMuted,meta,metaColor,aside,label}){
  const t=tone==='need'?{border:'1.5px dashed var(--dm-green-500)',background:'var(--dm-green-50)'}:tone==='off'?{border:'1.5px dashed var(--dm-line-strong)',background:'transparent',boxShadow:'none',opacity:.72}:{};
  return <div className="card" style={{padding:'12px 14px',display:'flex',alignItems:'center',gap:12,marginTop:10,...t}} data-screen-label={label}>
    <div style={{width:44,flex:'none',textAlign:'center'}}>
      <b style={{font:'700 14px/17px var(--font-display)',display:'block'}}>{wd}</b>
      <span style={{font:'500 10.5px/13px var(--font-ui)',color:'var(--dm-ink-3)',display:'block',marginBottom:cell?5:0}}>{dt}</span>
      {cell}
    </div>
    <div style={{flex:1,minWidth:0}}>
      <b style={{display:'block',font:titleMuted?'500 13px/17px var(--font-ui)':'600 14px/18px var(--font-display)',color:titleMuted?'var(--dm-ink-3)':'var(--dm-ink)',textWrap:'pretty'}}>{title}</b>
      {meta&&<span style={{display:'block',marginTop:2,font:'500 11px/14px var(--font-ui)',color:metaColor||'var(--dm-ink-3)'}}>{meta}</span>}
    </div>
    {aside&&<div style={{flex:'none',display:'flex',flexDirection:'column',alignItems:'flex-end',gap:5}}>{aside}</div>}
  </div>;
}
function App(){
  const [days,setDays]=React.useState(INIT);
  const used=USED_BEFORE+days.filter(x=>x.st!=='empty').length;
  const left=Math.max(0,12-used);
  const book=i=>{if(left<=0)return;setDays(days.map((x,j)=>j===i?{...x,st:'unpicked'}:x));};
  const cancel=i=>setDays(days.map((x,j)=>j===i?{...x,st:'empty',meal:null}:x));
  return <div className="app">
    <div style={{padding:'18px 20px 0',display:'flex',alignItems:'center',gap:12}}>
      <h1 style={{margin:0,flex:1,font:'600 var(--fs-d2)/var(--lh-d2) var(--font-display)'}}>Order when you're in</h1>
      <a href="./b2b-org-info.html" aria-label="Your benefit" style={{width:44,height:44,borderRadius:'50%',border:'1.5px solid var(--dm-line-strong)',background:'var(--dm-surface)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--dm-ink)',font:'700 15px var(--font-display)',flex:'none'}}>i</a>
    </div>
    <div className="scroll" style={{marginTop:12}}>
      <div style={{background:'var(--dm-pine-700)',borderRadius:'var(--r-card)',boxShadow:'var(--sh-2)',padding:'15px 17px',color:'#fff'}} data-screen-label="Sponsor benefit card — monthly">
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{width:44,height:44,borderRadius:14,background:'var(--dm-surface)',display:'flex',alignItems:'center',justifyContent:'center',font:'800 19px var(--font-display)',color:'var(--dm-sky-700)',flex:'none',boxShadow:'var(--sh-1)'}}>T</div>
          <div style={{flex:1,minWidth:0}}>
            <span className="micro" style={{color:'var(--dm-green-100)'}}>Sponsored by Tawuniya</span>
            <b style={{display:'block',font:'800 22px/26px var(--font-display)',fontVariantNumeric:'tabular-nums'}}>{used} of 12 <span style={{font:'600 12.5px var(--font-ui)',color:'var(--dm-green-100)'}}>lunches covered in January</span></b>
          </div>
        </div>
        <div style={{height:7,borderRadius:4,background:'rgba(255,255,255,.16)',marginTop:12,overflow:'hidden'}}><i style={{display:'block',height:'100%',width:Math.min(100,used/12*100)+'%',borderRadius:4,background:left===0?'var(--dm-amber-500)':'var(--dm-green-300)',transition:'width .3s var(--ease-serve)'}}/></div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:9,gap:10}}>
          <span style={{font:'500 11.5px/15px var(--font-ui)',color:left===0?'var(--dm-amber-100)':'var(--dm-green-100)'}}>{left===0?'Allowance finished — resets Feb 1, or order on your own card':`${left} more on Tawuniya · resets Feb 1`}</span>
          <span style={{background:'rgba(255,255,255,.13)',color:'#fff',borderRadius:'var(--r-pill)',padding:'4px 11px',font:'600 11px var(--font-ui)',flex:'none'}}>Olaya HQ</span>
        </div>
      </div>
      <span className="micro" style={{display:'block',margin:'18px 2px 0'}}>This week</span>
      {days.map((x,i)=>{
        if(x.st==='locked')return <DayRow key={x.wd} wd={x.wd} dt={x.dt} label={'Open day '+x.wd+' — locked'}
          cell={<span style={{color:'var(--dm-ink-3)',display:'inline-block'}}><LockIcon s={12}/></span>}
          title={x.meal} meta={x.k+' · kitchens cooking'} aside={<LockChip/>}/>;
        if(x.st==='unpicked')return <DayRow key={x.wd} wd={x.wd} dt={x.dt} label={'Open day '+x.wd+' — booked, meal unpicked'}
          title="Booked — pick your meal" meta="Choose by Mon 9:00 PM · on Tawuniya" metaColor="var(--dm-amber-700)"
          aside={<React.Fragment>
            <a href="./meal-selection-calendar.html" style={{font:'700 12px var(--font-ui)'}}>Pick meal</a>
            <button onClick={()=>cancel(i)} style={{appearance:'none',border:0,background:'none',cursor:'pointer',font:'600 11.5px var(--font-ui)',color:'var(--dm-terra-700)',padding:0}}>Cancel</button>
          </React.Fragment>}/>;
        if(left===0)return <DayRow key={x.wd} wd={x.wd} dt={x.dt} tone="off" label={'Open day '+x.wd+' — no allowance'}
          title="No lunch booked" titleMuted meta="January allowance used up"
          aside={<Button variant="outline" size="sm" disabled>Allowance used</Button>}/>;
        return <DayRow key={x.wd} wd={x.wd} dt={x.dt} tone="need" label={'Open day '+x.wd+' — bookable'}
          title="No lunch booked" titleMuted meta={'On Tawuniya if you book by '+(x.wd==='Wed'?'Tue':'Wed')+' 9:00 PM'}
          aside={<Button size="sm" onClick={()=>book(i)}>Book day</Button>}/>;
      })}
      <div style={{margin:'14px 2px 0',font:'400 11.5px/15px var(--font-ui)',color:'var(--dm-ink-3)'}}>Company cut-off: book a day before <b style={{color:'var(--dm-ink)'}}>9:00 PM</b> the night before. Want the same days every week? <a href="./b2b-recurring.html" style={{fontWeight:600}}>Switch to a standing schedule</a>.</div>
    </div>
    <TabBar active="subs"/>
  </div>;}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
