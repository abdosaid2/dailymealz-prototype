<!-- @dsCard group="App Screens (Green)" viewport="390x844" name="Consultation Booking" subtitle="Flagship full-day consult: what's included, day/slot picker with unavailable slot, pine confirmation" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dailymealz — Book a consultation</title>
<link rel="stylesheet" href="../../styles-green.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
html,body{height:100%}
body{width:390px;height:844px;margin:0 auto;overflow:hidden}
#root,.app{height:100%;display:flex;flex-direction:column;position:relative}
.scroll{flex:1;overflow-y:auto;padding:0 20px 120px;scrollbar-width:none}
.scroll::-webkit-scrollbar{display:none}
.micro{font:600 var(--fs-micro)/var(--lh-micro) var(--font-ui);letter-spacing:.06em;text-transform:uppercase;color:var(--dm-ink-3)}
.slot{appearance:none;cursor:pointer;border-radius:var(--r-pill);padding:10px 0;font:600 13px var(--font-ui);background:var(--dm-surface);border:1.5px solid var(--dm-line-strong);color:var(--dm-ink);flex:1;min-height:44px}
.slot.on{background:var(--dm-ink);border-color:var(--dm-ink);color:var(--dm-paper)}
.slot:disabled{cursor:default;background:var(--dm-sand);border-color:var(--dm-sand);color:var(--dm-ink-3);text-decoration:line-through}
</style></head>
<body data-screen-label="Consultation Booking (Green)"><div id="root"></div>
<script type="text/babel">
const {Button,Chip,DayPill}=window.DailymealzAppRedesignBrief_310f67;
const DAYS=[['Tue',20],['Wed',21],['Thu',22]];
const SLOTS={0:[['9:00 AM',true],['11:30 AM',false],['4:00 PM',true]],1:[['9:00 AM',true],['11:30 AM',true],['4:00 PM',true]],2:[['9:00 AM',false],['11:30 AM',true],['4:00 PM',true]]};
function App(){
  const [day,setDay]=React.useState(1);
  const [slot,setSlot]=React.useState(null);
  const [booked,setBooked]=React.useState(false);
  return <div className="app">
    <div style={{display:'flex',gap:12,alignItems:'center',padding:'18px 20px 8px'}}>
      <a href="./home-plans.html" aria-label="Back" style={{width:44,height:44,borderRadius:'50%',border:'1.5px solid var(--dm-line-strong)',background:'var(--dm-surface)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--dm-ink)',flex:'none'}}><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.5 4.5 7 10l5.5 5.5"/></svg></a>
      <div style={{flex:1}}>
        <h1 style={{margin:0,font:'600 21px/26px var(--font-display)'}}>Nutrition consultation</h1>
        <span style={{font:'400 var(--fs-caption)/var(--lh-caption) var(--font-ui)',color:'var(--dm-ink-2)'}}>Full-day plan with a licensed dietitian</span>
      </div>
      <b style={{font:'700 18px var(--font-display)',flex:'none'}}>120 <span style={{font:'600 11px var(--font-ui)',color:'var(--dm-ink-2)'}}>SAR</span></b>
    </div>
    <div className="scroll">
      {booked?<div style={{background:'var(--dm-pine-100)',borderRadius:'var(--r-card)',padding:18,marginTop:12,display:'flex',gap:12,alignItems:'flex-start'}} data-screen-label="Booked — confirmation">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--dm-pine-700)" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round" style={{flex:'none',marginTop:2}}><path d="M4.5 12.5 10 18 19.5 6.5"/></svg>
        <div>
          <b style={{font:'700 17px/22px var(--font-display)',color:'var(--dm-pine-700)'}}>Booked — {DAYS[day][0]} {DAYS[day][1]} Jan, {slot}</b>
          <span style={{display:'block',font:'400 12.5px/17px var(--font-ui)',color:'var(--dm-ink-2)',marginTop:4}}>Nour Al-Qahtani, RD will call you. We'll remind you the evening before, and your meal history + daily target are shared with her — nothing else.</span>
          <div style={{display:'flex',gap:8,marginTop:12}}>
            <a href="./subscription-dashboard.html"><Button variant="secondary" size="sm">Done</Button></a>
            <Button variant="ghost" size="sm" onClick={()=>{setBooked(false);setSlot(null);}}>Reschedule</Button>
          </div>
        </div>
      </div>
      :<React.Fragment>
        <div style={{background:'var(--dm-surface)',border:'1px solid var(--dm-line)',borderRadius:'var(--r-card)',boxShadow:'var(--sh-1)',padding:16,marginTop:12,display:'flex',gap:13,alignItems:'center'}}>
          <div className="dm-photo" style={{width:56,height:56,borderRadius:'50%',flex:'none'}}><span className="dm-photo-note" style={{fontSize:6.5}}>photo · RD</span></div>
          <div style={{flex:1,minWidth:0}}>
            <b style={{font:'600 15px/19px var(--font-display)'}}>Nour Al-Qahtani, RD</b>
            <span style={{display:'block',font:'400 12px/16px var(--font-ui)',color:'var(--dm-ink-2)'}}>Clinical dietitian · 9 yrs · Arabic & English</span>
            <span style={{font:'500 12px var(--font-ui)',color:'var(--dm-ink-2)'}}><span style={{color:'var(--dm-green-600)'}}>★</span> 4.9 · 210 sessions</span>
          </div>
        </div>
        <span className="micro" style={{display:'block',margin:'18px 0 8px'}}>What the day includes</span>
        <div style={{background:'var(--dm-surface)',border:'1px solid var(--dm-line)',borderRadius:'var(--r-card)',boxShadow:'var(--sh-1)',padding:'6px 16px'}}>
          {[['45-min video call','Goals, history, current plan review'],['Full-day meal plan','Breakfast to dinner, built around your lunches'],['Target & preferences tuned','Written into your account, menus follow'],['One week of follow-up','Chat questions answered within a day']].map(([t,s],i)=>
          <div key={t} style={{display:'flex',gap:11,alignItems:'flex-start',padding:'11px 0',borderTop:i?'1px dashed var(--dm-line)':'none'}}>
            <i style={{width:8,height:8,borderRadius:'50%',background:'var(--dm-green-500)',flex:'none',marginTop:6}}/>
            <span><b style={{font:'600 13.5px var(--font-ui)',display:'block'}}>{t}</b><span style={{font:'400 11.5px/15px var(--font-ui)',color:'var(--dm-ink-3)'}}>{s}</span></span>
          </div>)}
        </div>
        <span className="micro" style={{display:'block',margin:'18px 0 8px'}}>Pick a day</span>
        <div style={{display:'flex',gap:8}}>
          {DAYS.map(([d,n],i)=><DayPill key={d} day={d} date={n} state={day===i?'selected':'default'} onClick={()=>{setDay(i);setSlot(null);}}/>)}
        </div>
        <span className="micro" style={{display:'block',margin:'16px 0 8px'}}>Time</span>
        <div style={{display:'flex',gap:8}}>
          {SLOTS[day].map(([t,ok])=><button key={t} className={'slot'+(slot===t?' on':'')} disabled={!ok} onClick={()=>setSlot(t)}>{ok?t:t+' · taken'}</button>)}
        </div>
        <span style={{display:'block',margin:'12px 2px 0',font:'400 11.5px/15px var(--font-ui)',color:'var(--dm-ink-3)'}}>Slots are Riyadh time. Cancel free until the evening before.</span>
      </React.Fragment>}
    </div>
    {!booked&&<div style={{position:'absolute',insetInline:0,bottom:0,padding:'12px 20px 26px',background:'rgba(247,246,238,.9)',backdropFilter:'blur(14px)',borderTop:'1px solid var(--dm-line)'}}>
      <Button block size="lg" disabled={!slot} onClick={()=>setBooked(true)}>{slot?`Book ${DAYS[day][0]} ${DAYS[day][1]} · ${slot} — 120 SAR`:'Pick a time to book'}</Button>
    </div>}
  </div>;}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
