<!-- @dsCard group="App Screens (Green)" viewport="390x844" name="Review My Meals" subtitle="The step between calendar and cart: all days at a glance, missing-day warning, edit any day" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dailymealz — Review my meals</title>
<link rel="stylesheet" href="../../styles-green.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
html,body{height:100%}
body{width:390px;height:844px;margin:0 auto;overflow:hidden}
#root,.app{height:100%;display:flex;flex-direction:column;position:relative}
.scroll{flex:1;overflow-y:auto;padding:0 20px 130px;scrollbar-width:none}
.scroll::-webkit-scrollbar{display:none}
.micro{font:600 var(--fs-micro)/var(--lh-micro) var(--font-ui);letter-spacing:.06em;text-transform:uppercase;color:var(--dm-ink-3)}
</style></head>
<body data-screen-label="Review My Meals (Green)"><div id="root"></div>
<script type="text/babel">
const {Button}=window.DailymealzAppRedesignBrief_310f67;
const WEEK1=[
{d:'Sun 25',meal:'Saffron Grilled Chicken + Rice',k:'Wafra Kitchen',kcal:612},
{d:'Mon 26',meal:'Grilled Salmon & Quinoa',k:'Nabta',kcal:528,premium:7},
{d:'Tue 27',meal:'Chicken Musakhan Roll',k:'Zad House',kcal:486},
{d:'Wed 28',meal:null},
{d:'Thu 29',meal:'Pomegranate Quinoa Salad',k:'Lemona',kcal:388},
{d:'Fri 30',off:true}];
const WEEK2=[
{d:'Sun 1',meal:'Beet & Halloumi Grain Bowl',k:'Nabta',kcal:432},
{d:'Mon 2',meal:'Saffron Grilled Chicken + Rice',k:'Wafra Kitchen',kcal:612}];
function Row({x}){
  if(x.off)return <div style={{display:'flex',alignItems:'center',gap:12,padding:'10px 14px',borderRadius:'var(--r-card)',border:'1.5px dashed var(--dm-line)',marginTop:8}}>
    <b style={{font:'700 13px var(--font-display)',width:56,flex:'none',color:'var(--dm-ink-3)'}}>{x.d}</b>
    <span style={{font:'500 12.5px var(--font-ui)',color:'var(--dm-ink-3)'}}>Day off — no delivery</span>
  </div>;
  return <div style={{display:'flex',alignItems:'center',gap:12,padding:'10px 14px',borderRadius:'var(--r-card)',background:'var(--dm-surface)',border:x.meal?'1px solid var(--dm-line)':'1.5px solid var(--dm-amber-500)',boxShadow:'var(--sh-1)',marginTop:8}} data-screen-label={x.meal?undefined:'Missing day'}>
    <b style={{font:'700 13px var(--font-display)',width:56,flex:'none'}}>{x.d}</b>
    {x.meal?<React.Fragment>
      <div className="dm-photo" style={{width:42,height:42,flex:'none',borderRadius:11}}><span className="dm-photo-note" style={{fontSize:6}}>photo</span></div>
      <div style={{flex:1,minWidth:0}}>
        <b style={{display:'block',font:'600 13.5px/17px var(--font-display)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{x.meal}</b>
        <span style={{font:'500 11px var(--font-ui)',color:'var(--dm-ink-3)'}}>{x.k} · {x.kcal} kcal{x.premium?` · +${x.premium} SAR`:''}</span>
      </div>
      <a href="./meal-selection-calendar.html" style={{font:'600 12px var(--font-ui)',flex:'none'}}>Edit</a>
    </React.Fragment>
    :<React.Fragment>
      <div style={{flex:1}}><b style={{font:'600 13.5px var(--font-ui)',color:'var(--dm-amber-700)'}}>No meal yet</b>
      <span style={{display:'block',font:'400 11px var(--font-ui)',color:'var(--dm-ink-3)'}}>We'll serve the chef's pick unless you choose</span></div>
      <a href="./meal-selection-calendar.html" style={{flex:'none'}}><Button variant="secondary" size="sm">Pick</Button></a>
    </React.Fragment>}
  </div>;}
function App(){
  const picked=WEEK1.concat(WEEK2).filter(x=>x.meal).length;
  return <div className="app">
    <div style={{padding:'18px 20px 6px',display:'flex',alignItems:'center',gap:10}}>
      <a href="./meal-selection-calendar.html" aria-label="Back" style={{width:44,height:44,borderRadius:'50%',border:'1.5px solid var(--dm-line-strong)',background:'var(--dm-surface)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--dm-ink)',flex:'none'}}><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.5 4.5 7 10l5.5 5.5"/></svg></a>
      <div style={{flex:1}}>
        <h1 style={{margin:0,font:'600 21px/26px var(--font-display)'}}>Review my meals</h1>
        <span style={{font:'400 var(--fs-caption)/var(--lh-caption) var(--font-ui)',color:'var(--dm-ink-2)'}}>Balanced · starts Sun 25 Jan</span>
      </div>
      <span style={{background:'var(--dm-green-100)',color:'var(--dm-green-700)',borderRadius:'var(--r-pill)',padding:'7px 13px',font:'700 12.5px var(--font-ui)',whiteSpace:'nowrap'}}>{picked} of 20</span>
    </div>
    <div className="scroll">
      <span className="micro" style={{display:'block',margin:'10px 2px 2px'}}>Week 1 · Jan 25–30</span>
      {WEEK1.map(x=><Row key={x.d} x={x}/>)}
      <span className="micro" style={{display:'block',margin:'18px 2px 2px'}}>Week 2 · Feb 1–2 <span style={{textTransform:'none',letterSpacing:0,color:'var(--dm-ink-3)',fontWeight:500}}>· + 12 more days after checkout</span></span>
      {WEEK2.map(x=><Row key={x.d} x={x}/>)}
      <div style={{marginTop:14,background:'var(--dm-sand)',borderRadius:'var(--r-ctl)',padding:'10px 14px',font:'500 12px/17px var(--font-ui)',color:'var(--dm-ink-2)'}}>1 day has no pick — that's fine. Every day stays swappable until 9:00 PM the night before.</div>
    </div>
    <div style={{position:'absolute',insetInline:0,bottom:0,padding:'12px 20px 26px',background:'rgba(247,246,238,.9)',backdropFilter:'blur(14px)',borderTop:'1px solid var(--dm-line)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:9,font:'500 12px var(--font-ui)',color:'var(--dm-ink-2)'}}>
        <span>6 meals shown · 1 premium (+7 SAR)</span><span>avg 511 kcal</span>
      </div>
      <a href="./cart-checkout.html" style={{display:'block'}}><Button block size="lg" style={{width:'100%'}}>Looks right — go to checkout</Button></a>
    </div>
  </div>;}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
