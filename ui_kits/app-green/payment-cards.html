<!-- @dsCard group="App Screens (Green)" viewport="390x844" name="Payment — Cards, CVV & 3-D Secure" subtitle="Saved-cards management, CVV re-entry sheet, and the 3DS webview frame: loading, bank content, failure" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dailymealz — Cards & 3DS</title>
<link rel="stylesheet" href="../../styles-green.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
html,body{height:100%}
body{width:390px;height:844px;margin:0 auto;overflow:hidden}
#root,.app{height:100%;display:flex;flex-direction:column;position:relative}
.scroll{flex:1;overflow-y:auto;padding:0 20px 30px;scrollbar-width:none}
.scroll::-webkit-scrollbar{display:none}
.card{background:var(--dm-surface);border:1px solid var(--dm-line);border-radius:var(--r-card);box-shadow:var(--sh-1);margin-top:12px;padding:14px}
.micro{font:600 var(--fs-micro)/var(--lh-micro) var(--font-ui);letter-spacing:.06em;text-transform:uppercase;color:var(--dm-ink-3)}
.otp{width:52px;height:56px;border:1.5px solid var(--dm-line-strong);border-radius:var(--r-ctl);background:var(--dm-surface);text-align:center;font:700 24px var(--font-display);color:var(--dm-ink)}
.otp:focus{border-color:var(--dm-green-500);box-shadow:none;outline:none}
@keyframes sheetUp{from{transform:translateY(60px);opacity:0}to{transform:none;opacity:1}}
@keyframes spin{to{transform:rotate(1turn)}}
</style></head>
<body data-screen-label="Payment Cards & 3DS (Green)"><div id="root"></div>
<script type="text/babel">
const {Button}=window.DailymealzAppRedesignBrief_310f67;
function CardRow({brand,last,exp,dflt,onPay}){
  return <div className="card" style={{display:'flex',alignItems:'center',gap:12}}>
    <span style={{background:'var(--dm-sand)',borderRadius:8,padding:'6px 9px',font:'700 10px var(--font-ui)',color:'var(--dm-ink-2)',flex:'none'}}>{brand}</span>
    <div style={{flex:1,minWidth:0}}>
      <b style={{font:'600 14px var(--font-ui)'}}>·· {last}</b>{dflt&&<span style={{marginInlineStart:8,background:'var(--dm-green-100)',color:'var(--dm-green-700)',borderRadius:'var(--r-pill)',padding:'2px 8px',font:'700 10px var(--font-ui)'}}>Default</span>}
      <span style={{display:'block',font:'400 11px var(--font-ui)',color:'var(--dm-ink-3)'}}>Expires {exp}</span>
    </div>
    <Button variant="secondary" size="sm" onClick={onPay} style={{flex:'none'}}>Use for 704.00</Button>
    <button aria-label="Remove card" style={{appearance:'none',border:0,background:'none',cursor:'pointer',font:'600 12px var(--font-ui)',color:'var(--dm-terra-700)',flex:'none'}}>✕</button>
  </div>;}
function App(){
  const [stage,setStage]=React.useState('list'); // list | cvv | 3ds-load | 3ds | 3ds-fail | done
  const [code,setCode]=React.useState(['','','']);
  const cells=[React.useRef(),React.useRef(),React.useRef()];
  const put=(i,v)=>{const d=v.replace(/\D/g,'').slice(-1);const n=[...code];n[i]=d;setCode(n);
    if(d&&i<2)cells[i+1].current.focus();
    if(n.every(c=>c)){setStage('3ds-load');setTimeout(()=>setStage('3ds'),1200);}};
  return <div className="app">
    <div style={{display:'flex',gap:12,alignItems:'center',padding:'18px 20px 8px'}}>
      <a href="./account-wallet.html" aria-label="Back" style={{width:44,height:44,borderRadius:'50%',border:'1.5px solid var(--dm-line-strong)',background:'var(--dm-surface)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--dm-ink)',flex:'none'}}><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.5 4.5 7 10l5.5 5.5"/></svg></a>
      <h1 style={{margin:0,font:'600 21px var(--font-display)',flex:1}}>Saved cards</h1>
    </div>
    <div className="scroll">
      <CardRow brand="mada" last="4021" exp="08/27" dflt onPay={()=>{setCode(['','','']);setStage('cvv');}}/>
      <CardRow brand="VISA" last="8830" exp="03/28" onPay={()=>{setCode(['','','']);setStage('cvv');}}/>
      <button style={{width:'100%',marginTop:12,height:54,borderRadius:'var(--r-card)',border:'1.5px dashed var(--dm-line-strong)',background:'none',cursor:'pointer',font:'600 14px var(--font-ui)',color:'var(--dm-ink-2)'}}>+ Add a card</button>
      <span style={{display:'block',margin:'12px 2px 0',font:'400 11.5px/16px var(--font-ui)',color:'var(--dm-ink-3)'}}>Cards live with our payment partner (PCI-DSS), never on your phone. CVV is asked again on every charge; your bank confirms with 3-D Secure.</span>
      {stage==='done'&&<div style={{marginTop:14,background:'var(--dm-pine-100)',borderRadius:'var(--r-card)',padding:'13px 16px',display:'flex',gap:10,alignItems:'center'}} data-screen-label="3DS passed">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--dm-pine-700)" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round" style={{flex:'none'}}><path d="M4.5 12.5 10 18 19.5 6.5"/></svg>
        <span style={{font:'500 13px/18px var(--font-ui)',color:'var(--dm-pine-700)'}}>Bank confirmed — 704.00 SAR paid with mada ·· 4021.</span>
      </div>}
    </div>
    {stage==='cvv'&&<div style={{position:'absolute',inset:0,background:'rgba(31,38,30,.42)',zIndex:6}} data-screen-label="CVV re-entry sheet">
      <div style={{position:'absolute',insetInline:0,bottom:0,background:'var(--dm-paper)',borderRadius:'var(--r-sheet) var(--r-sheet) 0 0',boxShadow:'var(--sh-3)',padding:'10px 24px 28px',animation:'sheetUp var(--dur-sheet) var(--ease-serve) both'}}>
        <div style={{width:40,height:4.5,borderRadius:'var(--r-pill)',background:'var(--dm-line-strong)',margin:'4px auto 12px'}}/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <b style={{font:'700 var(--fs-d2)/var(--lh-d2) var(--font-display)'}}>Confirm it's you</b>
          <button onClick={()=>setStage('list')} aria-label="Close" style={{width:38,height:38,borderRadius:'50%',border:'1.5px solid var(--dm-line-strong)',background:'var(--dm-surface)',cursor:'pointer',font:'600 14px var(--font-ui)'}}>✕</button>
        </div>
        <span style={{display:'block',font:'400 13px/18px var(--font-ui)',color:'var(--dm-ink-2)',margin:'4px 0 16px'}}>Enter the 3-digit CVV for <b style={{color:'var(--dm-ink)'}}>mada ·· 4021</b> — the code on the back of the card.</span>
        <div dir="ltr" style={{display:'flex',gap:10,justifyContent:'center'}}>
          {code.map((c,i)=><input key={i} ref={cells[i]} className="otp" inputMode="numeric" type="password" autoFocus={i===0} value={c} onChange={e=>put(i,e.target.value)} aria-label={'CVV digit '+(i+1)}/>)}
        </div>
        <span style={{display:'block',textAlign:'center',marginTop:14,font:'400 11.5px var(--font-ui)',color:'var(--dm-ink-3)'}}>Filling all three continues to your bank's check.</span>
      </div>
    </div>}
    {(stage==='3ds-load'||stage==='3ds'||stage==='3ds-fail')&&<div style={{position:'absolute',inset:0,background:'var(--dm-paper)',zIndex:7,display:'flex',flexDirection:'column'}} data-screen-label="3-D Secure webview">
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'16px 18px 12px',borderBottom:'1px solid var(--dm-line)',background:'var(--dm-surface)'}}>
        <button onClick={()=>setStage('list')} aria-label="Cancel" style={{appearance:'none',border:0,background:'none',cursor:'pointer',font:'600 14px var(--font-ui)',color:'var(--dm-terra-700)',padding:0}}>Cancel</button>
        <div style={{flex:1,textAlign:'center'}}>
          <b style={{font:'600 14px var(--font-display)',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--dm-pine-700)" strokeWidth="2.2" strokeLinecap="round"><rect x="5" y="10.5" width="14" height="9.5" rx="2.5"/><path d="M8 10.5V7.5a4 4 0 0 1 8 0v3"/></svg>
            Saudi National Bank</b>
          <span style={{font:'400 10.5px var(--font-ui)',color:'var(--dm-ink-3)'}}>secure.snb.sa · your bank's page, not ours</span>
        </div>
        <span style={{width:44}}/>
      </div>
      {stage==='3ds-load'&&<div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:12}}>
        <i style={{width:26,height:26,border:'3px solid var(--dm-sand-2)',borderTopColor:'var(--dm-green-500)',borderRadius:'50%',animation:'spin .8s linear infinite'}}/>
        <span style={{font:'500 13px var(--font-ui)',color:'var(--dm-ink-2)'}}>Opening your bank's verification…</span>
      </div>}
      {stage==='3ds'&&<div style={{flex:1,padding:'26px 28px',display:'flex',flexDirection:'column'}}>
        <div style={{background:'var(--dm-surface)',border:'1px solid var(--dm-line)',borderRadius:14,padding:'18px 18px'}}>
          <span className="micro">SNB verification</span>
          <b style={{display:'block',font:'600 15px/20px var(--font-ui)',marginTop:6}}>Approve 704.00 SAR to Dailymealz?</b>
          <span style={{display:'block',font:'400 12px/16px var(--font-ui)',color:'var(--dm-ink-2)',marginTop:2}}>We sent a code to +966 55 ··· 830 — or approve in the SNB app.</span>
          <div style={{display:'flex',gap:8,marginTop:14}}>
            <Button size="sm" onClick={()=>setStage('done')}>Approve (demo)</Button>
            <Button variant="outline" size="sm" onClick={()=>setStage('3ds-fail')}>Fail it (demo)</Button>
          </div>
        </div>
        <span style={{marginTop:12,font:'400 11px/15px var(--font-ui)',color:'var(--dm-ink-3)'}}>This panel is the bank's webview content — Dailymealz only frames it with the header above and never sees your codes.</span>
      </div>}
      {stage==='3ds-fail'&&<div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'0 34px',textAlign:'center',gap:8}}>
        <div style={{width:74,height:74,borderRadius:'50%',background:'var(--st-failed-bg)',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <svg width="28" height="28" viewBox="0 0 20 20" fill="none" stroke="var(--st-failed-fg)" strokeWidth="2.4" strokeLinecap="round"><path d="m5 5 10 10M15 5 5 15"/></svg>
        </div>
        <b style={{font:'700 20px/25px var(--font-display)'}}>Verification didn't go through</b>
        <span style={{font:'400 13px/18px var(--font-ui)',color:'var(--dm-ink-2)'}}>Nothing was charged. Your cart is exactly as you left it — try again or pick another method.</span>
        <div style={{display:'flex',gap:9,marginTop:10}}>
          <Button size="lg" onClick={()=>{setCode(['','','']);setStage('cvv');}}>Try again</Button>
          <a href="./cart-checkout.html"><Button variant="ghost" size="lg">Other methods</Button></a>
        </div>
      </div>}
    </div>}
  </div>;}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
