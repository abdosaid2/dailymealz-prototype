<style>

<body data-screen-label="Account & Wallet (AR, Green)"><div id="root"></div>
<script type="text/babel">

const AI=s=>String(s).replace(/\d/g,d=>'٠١٢٣٤٥٦٧٨٩'[d]);

        </div>)}

      <div className="card" style={{padding:'2px 0'}}>

      </div>
      <div className="card" style={{padding:'13px 16px',display:'flex',alignItems:'center',gap:12}}>
        <div style={{flex:1}}><b style={{font:'600 14.5px var(--font-ui)'}}>English</b>
        <span style={{display:'block',font:'400 11.5px var(--font-ui)',color:'var(--dm-ink-3)'}}>بدّل لغة التطبيق — الاتجاه ينقلب إلى LTR</span></div>

      </div>
      <div className="card" style={{padding:'2px 0'}}>
        {[['المنظمة','التعاونية · الطلب الفردي مسموح'],['محادثة الدعم','نرد عادة خلال دقائق'],['الشروط وشهادة الضريبة وحقوق المستفيد','']].map(([t,s])=>
        <button key={t} className="rowbtn"><span style={{flex:1,minWidth:0}}>{t}{s&&<span style={{display:'block',font:'400 11.5px/16px var(--font-ui)',color:'var(--dm-ink-3)'}}>{s}</span>}</span><Chev/></button>)}

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',margin:'14px 4px 0'}}>

        <span dir="ltr" style={{font:'500 11px var(--font-ui)',color:'var(--dm-ink-3)'}}>v3.1.0</span>
      </div>
      <span style={{display:'block',margin:'6px 4px 0',font:'400 10.5px/15px var(--font-ui)',color:'var(--dm-ink-3)'}}>الحذف يسأل مرة واحدة، ويوضح ما يُحفظ لأنظمة الضرائب، ويكتمل داخل التطبيق — بلا مكالمات.</span>
    </div>
    <TabBar active="account" locale="ar"/>
  </div>;}
