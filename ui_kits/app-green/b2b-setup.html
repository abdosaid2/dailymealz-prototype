<!-- @dsCard group="App Screens (Green)" viewport="390x844" name="B2B — Guided Setup" subtitle="3 real decisions with a constant sponsor band: office branch → weekday rhythm → food rules + confirm" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dailymealz — Work setup</title>
<link rel="stylesheet" href="../../styles-green.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
html,body{height:100%}
body{width:390px;height:844px;margin:0 auto;overflow:hidden}
#root,.app{height:100%;display:flex;flex-direction:column}
.micro{font:600 var(--fs-micro)/var(--lh-micro) var(--font-ui);letter-spacing:.06em;text-transform:uppercase;color:var(--dm-ink-3)}
.opt{appearance:none;cursor:pointer;text-align:start;display:flex;gap:12px;align-items:flex-start;background:var(--dm-surface);border:1px solid var(--dm-line);border-radius:var(--r-card);box-shadow:var(--sh-1);padding:14px 15px;width:100%}
.opt.on{border:2px solid var(--dm-green-500);box-shadow:var(--sh-2);padding:13px 14px}
.radio{width:12px;height:12px;border-radius:50%;flex:none;margin-top:3px;border:2px solid var(--dm-line-strong)}
.on .radio{border:4px solid var(--dm-green-500)}
</style></head>
<body data-screen-label="B2B Guided Setup (Green)"><div id="root"></div>
<script type="text/babel">
const {Button,Chip,DayPill}=window.DailymealzAppRedesignBrief_310f67;
const BRANCHES=[['Olaya HQ','Tawuniya Tower, King Fahd Rd · floor 11 reception'],['Granada Business Park','Building B4, Eastern Ring Rd'],['DQ Branch','Diplomatic Quarter, Gate 3']];
const WEEK=[['SUN',18],['MON',19],['TUE',20],['WED',21],['THU',22]];
const EXCL=['Nuts','Dairy','Gluten','Shellfish','Beef','Spicy'];
const LABELS=['Your office','Your rhythm','Food & confirm'];
function App(){
  const [step,setStep]=React.useState(0);
  const [branch,setBranch]=React.useState(null);
  const [inDays,setInDays]=React.useState([true,true,true,true,true]);
  const [ex,setEx]=React.useState([]);
  const nDays=inDays.filter(Boolean).length;
  const toggleDay=i=>setInDays(inDays.map((v,j)=>j===i?!v:v));
  const toggleEx=e=>setEx(ex.includes(e)?ex.filter(x=>x!==e):[...ex,e]);
  const Edit=({to})=><button onClick={()=>setStep(to)} style={{appearance:'none',border:0,background:'none',cursor:'pointer',padding:0,font:'600 12px var(--font-ui)',color:'var(--dm-green-700)',flex:'none'}}>Edit</button>;
  return <div className="app">
    <div style={{padding:'18px 20px 0',display:'flex',alignItems:'center',gap:10}}>
      {step===0
      ?<a href="./onboarding.html" aria-label="Back" style={{width:44,height:44,borderRadius:'50%',border:'1.5px solid var(--dm-line-strong)',background:'var(--dm-surface)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--dm-ink)',flex:'none'}}><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.5 4.5 7 10l5.5 5.5"/></svg></a>
      :<button onClick={()=>setStep(step-1)} aria-label="Back" style={{appearance:'none',cursor:'pointer',width:44,height:44,borderRadius:'50%',border:'1.5px solid var(--dm-line-strong)',background:'var(--dm-surface)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--dm-ink)',flex:'none'}}><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.5 4.5 7 10l5.5 5.5"/></svg></button>}
      <div style={{flex:1,display:'flex',gap:5}}>{[0,1,2].map(i=><i key={i} style={{flex:1,height:4,borderRadius:2,background:i<=step?'var(--dm-green-500)':'var(--dm-sand-2)'}}/>)}</div>
      <span className="micro">{step+1} / 3</span>
    </div>
    <div style={{margin:'14px 20px 0',background:'var(--dm-pine-700)',borderRadius:'var(--r-card)',padding:'11px 14px',display:'flex',alignItems:'center',gap:11,color:'#fff'}} data-screen-label="Sponsor band">
      <div style={{width:34,height:34,borderRadius:11,background:'var(--dm-surface)',display:'flex',alignItems:'center',justifyContent:'center',font:'800 15px var(--font-display)',color:'var(--dm-sky-700)',flex:'none'}}>T</div>
      <div style={{flex:1,minWidth:0}}>
        <b style={{display:'block',font:'700 13.5px/17px var(--font-display)'}}>Lunch is on Tawuniya</b>
        <span style={{font:'500 11px/14px var(--font-ui)',color:'var(--dm-green-100)'}}>8 sponsored lunches a week · Sun–Thu at the office</span>
      </div>
    </div>
    {step===0&&<div style={{flex:1,display:'flex',flexDirection:'column',padding:'0 24px',minHeight:0}} data-screen-label="Step 1 — office branch">
      <span className="micro" style={{marginTop:20}}>Step 1 · {LABELS[0]}</span>
      <h1 style={{margin:'4px 0 4px',font:'700 var(--fs-d2)/var(--lh-d2) var(--font-display)'}}>Which office are you at?</h1>
      <span style={{font:'400 13px/18px var(--font-ui)',color:'var(--dm-ink-2)'}}>Delivery addresses are curated by Tawuniya — no map pin needed.</span>
      <div style={{display:'flex',flexDirection:'column',gap:10,marginTop:16}}>
        {BRANCHES.map(([n,l],i)=><button key={n} className={'opt'+(branch===i?' on':'')} onClick={()=>setBranch(i)}>
          <i className="radio"/><span><b style={{font:'600 15px/19px var(--font-display)',display:'block'}}>{n}</b>
          <span style={{font:'400 12px/16px var(--font-ui)',color:'var(--dm-ink-2)'}}>{l}</span></span>
        </button>)}
      </div>
      <span style={{font:'400 11.5px/15px var(--font-ui)',color:'var(--dm-ink-3)',marginTop:12}}>You can change branch anytime — it applies to unlocked orders only.</span>
      <div style={{flex:1}}/>
      <div style={{padding:'0 0 28px'}}><Button block size="lg" disabled={branch===null} onClick={()=>setStep(1)}>Continue</Button></div>
    </div>}
    {step===1&&<div style={{flex:1,display:'flex',flexDirection:'column',padding:'0 24px',minHeight:0}} data-screen-label="Step 2 — weekday rhythm">
      <span className="micro" style={{marginTop:20}}>Step 2 · {LABELS[1]}</span>
      <h1 style={{margin:'4px 0 4px',font:'700 var(--fs-d2)/var(--lh-d2) var(--font-display)'}}>Which days are you usually in?</h1>
      <span style={{font:'400 13px/18px var(--font-ui)',color:'var(--dm-ink-2)'}}>This becomes your standing week — swap meals or skip days any week.</span>
      <div style={{display:'flex',gap:8,marginTop:18,justifyContent:'center'}}>
        {WEEK.map(([d,dt],i)=><DayPill key={d} day={d} date={dt} state={inDays[i]?'selected':'default'} onClick={()=>toggleDay(i)}/>)}
      </div>
      <div style={{marginTop:16,background:'var(--dm-green-50)',border:'1px solid var(--dm-green-100)',borderRadius:'var(--r-ctl)',padding:'10px 13px',font:'500 12.5px/17px var(--font-ui)',color:'var(--dm-green-700)',textAlign:'center'}} data-screen-label="Live coverage line">
        {nDays===0?'Pick at least one day to continue':<span><b>{nDays} {nDays===1?'lunch':'lunches'} a week</b> on Tawuniya — up to 8 covered</span>}
      </div>
      <div style={{flex:1}}/>
      <div style={{padding:'0 0 28px'}}><Button block size="lg" disabled={nDays===0} onClick={()=>setStep(2)}>Continue</Button></div>
    </div>}
    {step===2&&<div style={{flex:1,display:'flex',flexDirection:'column',padding:'0 24px',minHeight:0,overflowY:'auto'}} data-screen-label="Step 3 — food rules + confirm">
      <span className="micro" style={{marginTop:20}}>Step 3 · {LABELS[2]}</span>
      <h1 style={{margin:'4px 0 4px',font:'700 var(--fs-d2)/var(--lh-d2) var(--font-display)'}}>Any food rules?</h1>
      <span style={{font:'400 13px/18px var(--font-ui)',color:'var(--dm-ink-2)'}}>Hard filters on every office menu — kitchens see the rule, never your name.</span>
      <div style={{display:'flex',gap:8,marginTop:14,flexWrap:'wrap'}}>
        {EXCL.map(e=><Chip key={e} selected={ex.includes(e)} onClick={()=>toggleEx(e)}>No {e.toLowerCase()}</Chip>)}
      </div>
      <div style={{marginTop:18,background:'var(--dm-surface)',border:'1px solid var(--dm-line)',borderRadius:'var(--r-card)',boxShadow:'var(--sh-1)',padding:'14px 16px'}} data-screen-label="Setup summary">
        <span className="micro">Your setup</span>
        {[['Office',branch===null?'—':BRANCHES[branch][0],0],['Days',nDays===5?'Sun–Thu · every weekday':WEEK.filter((_,i)=>inDays[i]).map(([d])=>d[0]+d.slice(1).toLowerCase()).join(', '),1],['Food',ex.length?ex.map(e=>'no '+e.toLowerCase()).join(', '):'No restrictions',2]].map(([k,v,to])=>
        <div key={k} style={{display:'flex',alignItems:'baseline',gap:10,padding:'9px 0',borderBottom:to<2?'1px dashed var(--dm-line)':'none'}}>
          <span style={{font:'600 11.5px var(--font-ui)',color:'var(--dm-ink-3)',width:44,flex:'none'}}>{k}</span>
          <b style={{flex:1,font:'600 13.5px/18px var(--font-ui)'}}>{v}</b>
          <Edit to={to}/>
        </div>)}
      </div>
      <div style={{flex:1,minHeight:16}}/>
      <div style={{padding:'0 0 28px'}}>
        <a href="./b2b-recurring.html" style={{display:'block'}}><Button block size="lg" style={{width:'100%'}}>Finish — build my week</Button></a>
        <span style={{display:'block',textAlign:'center',marginTop:10,font:'400 11.5px/15px var(--font-ui)',color:'var(--dm-ink-3)'}}>Prefer day-by-day ordering? Switch anytime from your week view.</span>
      </div>
    </div>}
  </div>;}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
