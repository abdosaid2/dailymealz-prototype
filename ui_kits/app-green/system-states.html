<!-- @dsCard group="App Screens (Green)" viewport="1220x1080" name="System States — Green" subtitle="Gates and empty/paused/expired states re-tinted for the green system" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dailymealz — System states</title>
<link rel="stylesheet" href="../../styles-green.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
body{padding:36px 40px 44px}
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:28px 24px;max-width:1140px;margin:18px auto 0}
.frame{width:100%;height:430px;background:var(--dm-paper);border:1px solid var(--dm-line);border-radius:26px;box-shadow:var(--sh-2);overflow:hidden;position:relative}
.cap{margin-top:10px;font:500 10px var(--font-mono);color:var(--dm-ink-3);letter-spacing:.04em;text-align:center}
.micro{font:600 var(--fs-micro)/var(--lh-micro) var(--font-ui);letter-spacing:.06em;text-transform:uppercase;color:var(--dm-ink-3)}
@keyframes shimmer{0%,100%{opacity:.5}50%{opacity:1}}
</style></head>
<body data-screen-label="System States & Gates (Green)"><div id="root"></div>
<script type="text/babel">
const {Button,MealsRing,StatusBadge}=window.DailymealzAppRedesignBrief_310f67;
function Sun({bg='var(--dm-sand)',dot='var(--dm-saffron-500)',size=104}){return <div className="dm-dots" style={{width:size,height:size,borderRadius:'50%',background:bg,display:'flex',alignItems:'center',justifyContent:'center'}}><i style={{width:size*.34,height:size*.34,borderRadius:'50%',background:dot}}/></div>;}
function Gate({children}){return <div style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',textAlign:'center',padding:'0 34px',gap:8}}>{children}</div>;}
function H({children}){return <b style={{font:'700 22px/27px var(--font-display)',textWrap:'pretty'}}>{children}</b>;}
function P({children}){return <span style={{font:'400 13px/19px var(--font-ui)',color:'var(--dm-ink-2)',textWrap:'pretty'}}>{children}</span>;}
function App(){return <div>
  <div style={{maxWidth:1140,margin:'0 auto'}}>
    <b style={{font:'700 26px var(--font-display)'}}>System states &amp; gates</b>
    <span style={{display:'block',font:'400 13.5px/19px var(--font-ui)',color:'var(--dm-ink-2)',marginTop:4}}>One visual language — sun circle + one-line answer + one action — inherited by every screen family. Blocking gates never show a tab bar; recoverable states always keep the user’s work.</span>
  </div>
  <div className="board">
    <div><div className="frame"><Gate>
      <Sun/><div style={{height:6}}/>
      <H>Time for a fresh version</H>
      <P>This version can’t place orders anymore. Update once and you’re back — your subscription is untouched.</P>
      <div style={{height:10}}/><Button size="lg" style={{minWidth:200}}>Update on the App Store</Button>
      <span style={{font:'500 11px var(--font-ui)',color:'var(--dm-ink-3)'}}>v2.4 → v3.1 · takes about a minute</span>
    </Gate></div><div className="cap">force update · blocking, no bypass, no tab bar</div></div>
    <div><div className="frame"><Gate>
      <Sun dot="var(--dm-sand-2)"/><div style={{height:6}}/>
      <H>You’re offline</H>
      <P>We saved your picks on this phone. Reconnect and we’ll sync them — nothing is lost.</P>
      <div style={{height:10}}/><Button variant="secondary" size="lg" style={{minWidth:160}}>Try again</Button>
      <span style={{font:'500 11px var(--font-ui)',color:'var(--dm-ink-3)'}}>Showing your last synced meals</span>
    </Gate></div><div className="cap">offline · retry keeps local state, stale data stays visible</div></div>
    <div><div className="frame">
      <div aria-hidden style={{position:'absolute',inset:0,padding:20}}>
        <i style={{display:'block',height:98,borderRadius:20,background:'var(--dm-sand)'}}/>
        <div style={{display:'flex',gap:8,marginTop:12}}>{[0,1,2,3].map(i=><i key={i} style={{width:54,height:66,borderRadius:16,background:'var(--dm-sand)'}}/>)}</div>
        <div style={{position:'absolute',inset:0,background:'rgba(38,31,21,.42)'}}/>
      </div>
      <div style={{position:'absolute',insetInline:0,bottom:0,background:'var(--dm-paper)',borderRadius:'26px 26px 0 0',boxShadow:'var(--sh-3)',padding:'12px 22px 20px'}}>
        <div style={{width:36,height:4,borderRadius:99,background:'var(--dm-line-strong)',margin:'0 auto 12px'}}/>
        <b style={{font:'700 19px/24px var(--font-display)'}}>Never miss the swap window</b>
        <span style={{display:'block',font:'400 12.5px/17px var(--font-ui)',color:'var(--dm-ink-2)',margin:'4px 0 12px'}}>A nudge before tomorrow’s meal locks, and a ping when your driver is close. That’s it — no marketing noise.</span>
        <Button block>Allow notifications</Button>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:12,paddingTop:11,borderTop:'1px dashed var(--dm-line)'}}>
          <span style={{font:'500 12.5px var(--font-ui)',color:'var(--dm-ink-2)'}}>Also on WhatsApp</span>
          <i style={{width:44,height:26,borderRadius:99,background:'var(--dm-sand-2)',position:'relative'}}><i style={{position:'absolute',top:3,insetInlineStart:3,width:20,height:20,borderRadius:'50%',background:'var(--dm-surface)',boxShadow:'var(--sh-1)'}}/></i>
        </div>
        <div style={{textAlign:'center',marginTop:10}}><span style={{font:'600 12.5px var(--font-ui)',color:'var(--dm-ink-3)'}}>Maybe later</span></div>
      </div>
    </div><div className="cap">notification + whatsapp opt-in · contextual sheet, shown after value, dismissible</div></div>
    <div><div className="frame">
      <div style={{padding:'22px 22px 0'}}><b style={{font:'700 22px var(--font-display)'}}>My meals</b></div>
      <Gate>
        <div style={{width:112,height:112,borderRadius:'50%',border:'2.5px dashed var(--dm-line-strong)',display:'flex',alignItems:'center',justifyContent:'center'}}><i style={{width:36,height:36,borderRadius:'50%',background:'var(--dm-sand)'}}/></div>
        <div style={{height:4}}/>
        <H>No plan on the table yet</H>
        <P>Pick a plan once — then this tab becomes your daily lunch ritual: track today, swap tomorrow.</P>
        <div style={{height:8}}/><Button size="lg" style={{minWidth:180}}>Browse plans</Button>
      </Gate>
    </div><div className="cap">empty subscriptions tab · the conversion moment, dashed ring = unfilled plate</div></div>
    <div><div className="frame">
      <div style={{padding:'20px 22px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><b style={{font:'700 22px var(--font-display)'}}>My meals</b><StatusBadge status="paused" size="sm"/></div>
        <div style={{background:'var(--dm-surface)',border:'1px solid var(--dm-line)',borderRadius:20,boxShadow:'var(--sh-1)',padding:16,marginTop:14,display:'flex',gap:14,alignItems:'center'}}>
          <div style={{filter:'grayscale(1) opacity(.55)'}}><MealsRing remaining={9} total={20} size={76}/></div>
          <div style={{flex:1}}>
            <b style={{font:'600 15px/19px var(--font-ui)'}}>Paused until Sun 1 Feb</b>
            <span style={{display:'block',font:'400 12px/16px var(--font-ui)',color:'var(--dm-ink-2)'}}>9 lunches waiting. No deliveries, no charges while paused.</span>
          </div>
        </div>
        <div style={{marginTop:12}}><Button block size="lg">Resume deliveries</Button></div>
        <div style={{textAlign:'center',marginTop:10}}><span style={{font:'600 13px var(--font-ui)',color:'var(--dm-ink-2)'}}>Change resume date</span></div>
        <div style={{marginTop:16,background:'var(--dm-sand)',borderRadius:14,padding:'10px 14px',font:'500 11.5px/16px var(--font-ui)',color:'var(--dm-ink-2)'}}>Tomorrow’s menu still opens 6:00 PM — resume tonight and you can eat tomorrow.</div>
      </div>
    </div><div className="cap">paused subscription · resume-first layout, ring desaturates</div></div>
    <div><div className="frame">
      <div style={{padding:'20px 22px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><b style={{font:'700 22px var(--font-display)'}}>My meals</b><span style={{background:'var(--dm-sand)',color:'var(--dm-ink-2)',borderRadius:99,padding:'4px 12px',font:'600 11.5px var(--font-ui)'}}>Ended Thu 15 Jan</span></div>
        <div className="dm-dots" style={{background:'var(--dm-saffron-100)',borderRadius:20,padding:18,marginTop:14}}>
          <b style={{font:'700 19px/24px var(--font-display)',color:'var(--dm-saffron-700)'}}>Welcome back to the sufra</b>
          <span style={{display:'block',font:'400 12.5px/17px var(--font-ui)',color:'var(--dm-ink-2)',margin:'4px 0 12px'}}>Your Balanced plan ended after 20 meals. Renew and keep your rating streak, wallet and saved swaps.</span>
          <Button size="lg" block>Renew — 20 lunches · 760 SAR</Button>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',marginTop:14,padding:'0 4px'}}>
          {[['20','meals eaten'],['612','avg kcal'],['4.7','your avg ★']].map(([v,l])=><div key={l} style={{textAlign:'center'}}>
            <b style={{font:'700 21px var(--font-display)'}}>{v}</b><span style={{display:'block',font:'500 10.5px var(--font-ui)',color:'var(--dm-ink-3)'}}>{l}</span></div>)}
        </div>
        <div style={{textAlign:'center',marginTop:14}}><span style={{font:'600 13px var(--font-ui)',color:'var(--dm-ink-2)'}}>Browse other plans</span></div>
      </div>
    </div><div className="cap">expired subscription · renew-first, recap stats do the persuading</div></div>
  </div>
</div>;}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
