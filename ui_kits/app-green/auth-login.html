<!-- @dsCard group="App Screens (Green)" viewport="390x844" name="Login & OTP — Green" subtitle="Phone-first gate with OTP error/resend states — under the brand green" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dailymealz — Sign in</title>
<link rel="stylesheet" href="../../styles-green.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
html,body{height:100%}
body{width:390px;height:844px;margin:0 auto;overflow:hidden;background:var(--dm-paper)}
#root,.app{height:100%;position:relative}
@keyframes sheetUp{from{transform:translateY(60px);opacity:0}to{transform:none;opacity:1}}
@keyframes shake{0%,100%{transform:none}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}
.otp{width:58px;height:64px;border:1.5px solid var(--dm-line-strong);border-radius:var(--r-ctl);background:var(--dm-surface);text-align:center;font:700 30px var(--font-display);color:var(--dm-ink);caret-color:var(--dm-saffron-500)}
.otp:focus{border-color:var(--dm-saffron-500);box-shadow:none;outline:none}
.otp.err{border-color:var(--dm-terra-500);background:var(--dm-terra-100)}
.field{width:100%;height:54px;border:1.5px solid var(--dm-line-strong);border-radius:var(--r-ctl);background:var(--dm-surface);padding:0 16px;font:500 17px var(--font-ui);color:var(--dm-ink)}
.field:focus{border-color:var(--dm-saffron-500);box-shadow:none;outline:none}
</style></head>
<body data-screen-label="Login & OTP (Green)"><div id="root"></div>
<script type="text/babel">
const {Button}=window.DailymealzAppRedesignBrief_310f67;
function Backdrop(){/* the place the guest came from — plan details, kept under the gate */
  return <div aria-hidden style={{position:'absolute',inset:0,overflow:'hidden'}}>
    <div className="dm-photo" style={{height:250,borderRadius:0}}><span className="dm-photo-note">photo · plan hero</span></div>
    <div style={{padding:'18px 20px'}}>
      <b style={{font:'700 24px var(--font-display)'}}>Balanced · 20 lunches</b>
      <p style={{margin:'6px 0 0',font:'400 14px/21px var(--font-ui)',color:'var(--dm-ink-2)'}}>38 SAR per meal · 760 SAR total</p>
      <div style={{height:56,borderRadius:'var(--r-pill)',background:'var(--dm-saffron-500)',marginTop:18,display:'flex',alignItems:'center',justifyContent:'center',font:'700 16px var(--font-ui)'}}>Start subscription</div>
    </div>
    <div style={{position:'absolute',inset:0,background:'rgba(38,31,21,.48)'}}/>
  </div>;}
function AppleMark(){return <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden><path d="M16.7 12.9c0-2.4 2-3.6 2.1-3.7-1.1-1.7-2.9-1.9-3.5-1.9-1.5-.2-2.9.9-3.7.9-.8 0-1.9-.9-3.2-.9-1.6 0-3.1 1-4 2.4-1.7 2.9-.4 7.3 1.2 9.7.8 1.2 1.8 2.5 3 2.4 1.2 0 1.7-.8 3.2-.8s1.9.8 3.2.8c1.3 0 2.2-1.2 3-2.4.9-1.4 1.3-2.7 1.3-2.8-.1 0-2.6-1-2.6-3.7zM14.4 5.7c.7-.8 1.1-1.9 1-3-1 0-2.1.7-2.8 1.5-.6.7-1.2 1.8-1 2.9 1.1.1 2.2-.6 2.8-1.4z"/></svg>;}
function GoogleMark(){return <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden><path fill="#4285F4" d="M23 12.3c0-.8-.1-1.6-.2-2.3H12v4.4h6.2a5.3 5.3 0 0 1-2.3 3.5v2.9h3.7c2.2-2 3.4-5 3.4-8.5z"/><path fill="#34A853" d="M12 23c3.1 0 5.7-1 7.6-2.8l-3.7-2.9c-1 .7-2.4 1.1-3.9 1.1-3 0-5.5-2-6.4-4.7H1.8v3A11.5 11.5 0 0 0 12 23z"/><path fill="#FBBC05" d="M5.6 13.7a6.9 6.9 0 0 1 0-4.4v-3H1.8a11.5 11.5 0 0 0 0 10.4l3.8-3z"/><path fill="#EA4335" d="M12 5.6c1.7 0 3.2.6 4.4 1.7L19.7 4A11.5 11.5 0 0 0 1.8 6.3l3.8 3c.9-2.7 3.4-4.7 6.4-4.7z"/></svg>;}
function App(){
  const [step,setStep]=React.useState('options');
  const [phone,setPhone]=React.useState('');
  const [phoneErr,setPhoneErr]=React.useState('');
  const [code,setCode]=React.useState(['','','','']);
  const [otpErr,setOtpErr]=React.useState('');
  const [left,setLeft]=React.useState(24);
  const [resends,setResends]=React.useState(0);
  const [sent,setSent]=React.useState(false);
  const cells=[React.useRef(),React.useRef(),React.useRef(),React.useRef()];
  React.useEffect(()=>{if(step!=='otp'||left<=0)return;const t=setTimeout(()=>setLeft(left-1),1000);return()=>clearTimeout(t);},[step,left]);
  const submitPhone=()=>{const p=phone.replace(/\s/g,'');if(!/^5\d{8}$/.test(p)){setPhoneErr('Enter a Saudi mobile starting with 5 — 9 digits.');return;}setPhoneErr('');setStep('otp');setLeft(24);setCode(['','','','']);setOtpErr('');};
  const put=(i,v)=>{
    if(otpErr){setOtpErr('')}
    const d=v.replace(/\D/g,'').slice(-1);const next=[...code];next[i]=d;setCode(next);
    if(d&&i<3)cells[i+1].current.focus();
    if(next.every(c=>c!=='')){
      setTimeout(()=>{if(next.join('')==='1234'){setStep('done');}else{setOtpErr('That code didn’t match. Check the SMS and try again.');setCode(['','','','']);cells[0].current&&cells[0].current.focus();}},220);
    }};
  const back=(i,e)=>{if(e.key==='Backspace'&&!code[i]&&i>0)cells[i-1].current.focus();};
  const resend=()=>{if(resends>=2)return;setResends(resends+1);setLeft(24);setSent(true);setTimeout(()=>setSent(false),2200);};
  const sheet={position:'absolute',insetInline:0,bottom:0,background:'var(--dm-paper)',borderRadius:'var(--r-sheet) var(--r-sheet) 0 0',boxShadow:'var(--sh-3)',padding:'10px 24px 28px',animation:'sheetUp var(--dur-sheet) var(--ease-serve) both'};
  const handle=<div style={{width:40,height:4.5,borderRadius:'var(--r-pill)',background:'var(--dm-line-strong)',margin:'4px auto 16px'}}/>;
  return <div className="app">
    <Backdrop/>
    {step==='options'&&<div style={sheet} data-screen-label="Login options sheet">{handle}
      <h1 style={{margin:0,font:'700 var(--fs-d2)/var(--lh-d2) var(--font-display)'}}>Save your plan &amp; check out</h1>
      <p style={{margin:'6px 0 18px',font:'400 var(--fs-label)/var(--lh-label) var(--font-ui)',color:'var(--dm-ink-2)'}}>One account for your meals, wallet and points. New or returning — same door.</p>
      <label style={{display:'block',font:'600 var(--fs-micro)/var(--lh-micro) var(--font-ui)',letterSpacing:'.06em',textTransform:'uppercase',color:'var(--dm-ink-3)',marginBottom:6}}>Mobile number</label>
      <div style={{display:'flex',gap:8}}>
        <button style={{appearance:'none',cursor:'pointer',border:'1.5px solid var(--dm-line-strong)',background:'var(--dm-surface)',borderRadius:'var(--r-ctl)',padding:'0 12px',font:'600 15px var(--font-ui)',color:'var(--dm-ink)',whiteSpace:'nowrap'}}>KSA +966</button>
        <input className="field" style={phoneErr?{borderColor:'var(--dm-terra-500)'}:null} inputMode="numeric" placeholder="5X XXX XXXX" value={phone} onChange={e=>setPhone(e.target.value)} dir="ltr"/>
      </div>
      {phoneErr&&<span style={{display:'block',marginTop:6,font:'500 12px var(--font-ui)',color:'var(--dm-terra-700)'}}>{phoneErr}</span>}
      <div style={{marginTop:12}}><Button block size="lg" onClick={submitPhone}>Send code</Button></div>
      <div style={{display:'flex',alignItems:'center',gap:12,margin:'16px 0'}}><i style={{flex:1,height:1,background:'var(--dm-line)'}}/><span style={{font:'500 12px var(--font-ui)',color:'var(--dm-ink-3)'}}>or</span><i style={{flex:1,height:1,background:'var(--dm-line)'}}/></div>
      <div style={{display:'flex',flexDirection:'column',gap:9}}>
        <button style={{height:52,borderRadius:'var(--r-pill)',border:0,cursor:'pointer',background:'var(--dm-ink)',color:'var(--dm-paper)',font:'600 15px var(--font-ui)',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}><AppleMark/> Continue with Apple</button>
        <button style={{height:52,borderRadius:'var(--r-pill)',border:'1.5px solid var(--dm-line-strong)',cursor:'pointer',background:'var(--dm-surface)',color:'var(--dm-ink)',font:'600 15px var(--font-ui)',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}><GoogleMark/> Continue with Google</button>
      </div>
      <div style={{textAlign:'center',marginTop:14,font:'400 13px var(--font-ui)',color:'var(--dm-ink-2)'}}>Prefer email? <a href="#email" onClick={e=>e.preventDefault()} style={{fontWeight:700}}>Continue with email</a></div>
      <div style={{textAlign:'center',marginTop:12}}><a href="./onboarding.html" style={{font:'500 12px var(--font-ui)',color:'var(--dm-ink-3)'}}>Keep browsing as guest</a></div>
    </div>}
    {step==='otp'&&<div style={sheet} data-screen-label="OTP verification">{handle}
      <h1 style={{margin:0,font:'700 var(--fs-d2)/var(--lh-d2) var(--font-display)'}}>Enter the code</h1>
      <p style={{margin:'6px 0 20px',font:'400 var(--fs-label)/var(--lh-label) var(--font-ui)',color:'var(--dm-ink-2)'}}>Sent by SMS to <b dir="ltr" style={{color:'var(--dm-ink)'}}>+966 {phone.replace(/\s/g,'').replace(/(\d{2})(\d{3})(\d{4})/,'$1 $2 $3')}</b> · <a href="#change" onClick={e=>{e.preventDefault();setStep('options');}} style={{fontWeight:600}}>Change number</a></p>
      <div dir="ltr" style={{display:'flex',gap:10,justifyContent:'center',animation:otpErr?'shake .38s':'none'}}>
        {code.map((c,i)=><input key={i} ref={cells[i]} className={'otp'+(otpErr?' err':'')} inputMode="numeric" autoFocus={i===0} value={c} onChange={e=>put(i,e.target.value)} onKeyDown={e=>back(i,e)} aria-label={'Digit '+(i+1)}/>)}
      </div>
      {otpErr?<span role="alert" style={{display:'block',textAlign:'center',marginTop:12,font:'500 12.5px var(--font-ui)',color:'var(--dm-terra-700)'}}>{otpErr}</span>
      :sent?<span style={{display:'block',textAlign:'center',marginTop:12,font:'500 12.5px var(--font-ui)',color:'var(--dm-olive-700)'}}>New code sent.</span>
      :<span style={{display:'block',textAlign:'center',marginTop:12,font:'400 12.5px var(--font-ui)',color:'var(--dm-ink-3)'}}>Code fills automatically from SMS.</span>}
      <div style={{textAlign:'center',marginTop:18,font:'400 13px var(--font-ui)',color:'var(--dm-ink-2)'}}>
        {resends>=2?<span style={{color:'var(--dm-terra-700)',fontWeight:500}}>Too many codes — try again in 5 minutes.</span>
        :left>0?<span>Resend code in <b style={{fontVariantNumeric:'tabular-nums'}}>0:{String(left).padStart(2,'0')}</b></span>
        :<a href="#resend" onClick={e=>{e.preventDefault();resend();}} style={{fontWeight:700}}>Resend code</a>}
      </div>
      <div style={{textAlign:'center',marginTop:26,font:'500 9.5px var(--font-mono)',color:'var(--dm-ink-3)',letterSpacing:'.03em'}}>demo · 1234 verifies, anything else errors</div>
    </div>}
    {step==='done'&&<div style={{...sheet,paddingBottom:34}} data-screen-label="Signed in — return to task">{handle}
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',textAlign:'center',padding:'8px 0 4px'}}>
        <div style={{width:76,height:76,borderRadius:'50%',background:'var(--dm-olive-100)',display:'flex',alignItems:'center',justifyContent:'center',animation:'dm-serve var(--dur-serve) var(--ease-serve) both'}}>
          <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="var(--dm-olive-700)" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M4.5 12.5 10 18 19.5 6.5"/></svg>
        </div>
        <h1 style={{margin:'14px 0 0',font:'700 var(--fs-d2)/var(--lh-d2) var(--font-display)'}}>Salam, Faisal</h1>
        <p style={{margin:'6px 0 20px',font:'400 var(--fs-label)/var(--lh-label) var(--font-ui)',color:'var(--dm-ink-2)'}}>You’re in. Your Balanced plan is saved — pick up right where you left off.</p>
        <a href="./cart-checkout.html" style={{display:'block',width:'100%'}}><Button block size="lg" style={{width:'100%'}}>Continue to checkout</Button></a>
        <a href="./home-plans.html" style={{marginTop:12,font:'600 14px var(--font-ui)'}}>Browse home instead</a>
      </div>
    </div>}
  </div>;}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
