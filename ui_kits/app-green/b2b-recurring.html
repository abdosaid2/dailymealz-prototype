<!-- @dsCard group="App Screens (Green)" viewport="390x844" name="B2B — Recurring Week" subtitle="Sponsor benefit card with unified allowance, week verdict, one day-row component: locked / editable / needs-pick / day-off" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dailymealz — My work lunches</title>
<link rel="stylesheet" href="../../styles-green.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
html,body{height:100%}
body{width:390px;height:844px;margin:0 auto;overflow:hidden}
#root,.app{height:100%;display:flex;flex-direction:column;position:relative}
.scroll{flex:1;overflow-y:auto;padding:0 20px 90px;scrollbar-width:none}
.scroll::-webkit-scrollbar{display:none}
.card{background:var(--dm-surface);border:1px solid var(--dm-line);border-radius:var(--r-card);box-shadow:var(--sh-1)}
.micro{font:600 var(--fs-micro)/var(--lh-micro) var(--font-ui);letter-spacing:.06em;text-transform:uppercase;color:var(--dm-ink-3)}
@keyframes sheetUp{from{transform:translateY(60px);opacity:0}to{transform:none;opacity:1}}
</style></head>
<body data-screen-label="B2B Recurring Week (Green)"><div id="root"></div>
<script type="text/babel">
const {Button,TabBar,StatusBadge}=window.DailymealzAppRedesignBrief_310f67;
const INIT=[
{wd:'Sun',dt:18,meal:'Saffron Grilled Chicken + Rice',k:'Wafra Kitchen',qty:1,on:true,locked:true},
{wd:'Mon',dt:19,meal:'Grilled Salmon & Quinoa',k:'Nabta',qty:1,on:true,locked:true},
{wd:'Tue',dt:20,meal:'Chicken Musakhan Roll',k:'Zad House',qty:2,on:true},
{wd:'Wed',dt:21,meal:null,k:null,qty:1,on:true},
{wd:'Thu',dt:22,meal:null,k:null,qty:1,on:false}];
const FULL={Sun:'Sunday',Mon:'Monday',Tue:'Tuesday',Wed:'Wednesday',Thu:'Thursday'};
const BRANCHES=['Olaya HQ · Tawuniya Tower','Granada Business Park · B4','DQ Branch · Gate 3'];
function LockIcon({s=10}){return <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" style={{flex:'none'}}><rect x="5" y="10.5" width="14" height="9.5" rx="2.5"/><path d="M8 10.5V7.5a4 4 0 0 1 8 0v3"/></svg>;}
function LockChip(){return <span style={{display:'inline-flex',alignItems:'center',gap:5,background:'var(--st-paused-bg)',color:'var(--st-paused-fg)',borderRadius:'var(--r-pill)',padding:'4px 10px',font:'600 10.5px var(--font-ui)',flex:'none'}}><LockIcon/>Locked</span>;}
function Switch({on,onChange}){return <button role="switch" aria-checked={on} onClick={onChange} style={{appearance:'none',cursor:'pointer',width:34,height:20,borderRadius:'var(--r-pill)',border:0,background:on?'var(--dm-green-500)':'var(--dm-sand-2)',position:'relative',margin:'0 auto',display:'block'}}><i style={{position:'absolute',top:2.5,insetInlineStart:on?16.5:2.5,width:15,height:15,borderRadius:'50%',background:'var(--dm-surface)',boxShadow:'var(--sh-1)',transition:'inset-inline-start .15s'}}/></button>;}
function DayRow({wd,dt,tone,cell,title,titleMuted,meta,aside,label}){
  const t=tone==='need'?{border:'1.5px dashed var(--dm-green-500)',background:'var(--dm-green-50)'}:tone==='off'?{border:'1.5px dashed var(--dm-line-strong)',background:'transparent',boxShadow:'none',opacity:.72}:{};
  return <div className="card" style={{padding:'12px 14px',display:'flex',alignItems:'center',gap:12,marginTop:10,...t}} data-screen-label={label}>
    <div style={{width:44,flex:'none',textAlign:'center'}}>
      <b style={{font:'700 14px/17px var(--font-display)',display:'block'}}>{wd}</b>
      <span style={{font:'500 10.5px/13px var(--font-ui)',color:'var(--dm-ink-3)',display:'block',marginBottom:5}}>{dt}</span>
      {cell}
    </div>
    <div style={{flex:1,minWidth:0}}>
      <b style={{display:'block',font:titleMuted?'500 13px/17px var(--font-ui)':'600 14px/18px var(--font-display)',color:titleMuted?'var(--dm-ink-3)':'var(--dm-ink)',textWrap:'pretty'}}>{title}</b>
      {meta&&<span style={{display:'block',marginTop:2,font:'500 11px/14px var(--font-ui)',color:'var(--dm-ink-3)'}}>{meta}</span>}
    </div>
    {aside&&<div style={{flex:'none',display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6}}>{aside}</div>}
  </div>;
}
function App(){
  const [days,setDays]=React.useState(INIT);
  const [branch,setBranch]=React.useState(0);
  const [sheet,setSheet]=React.useState(false);
  const used=days.filter(x=>x.on&&x.meal).reduce((s,x)=>s+x.qty,0);
  const needs=days.filter(x=>x.on&&!x.locked&&!x.meal);
  const upd=(i,p)=>setDays(days.map((x,j)=>j===i?{...x,...p}:x));
  return <div className="app">
    <div style={{padding:'18px 20px 0',display:'flex',alignItems:'center',gap:12}}>
      <h1 style={{margin:0,flex:1,font:'600 var(--fs-d2)/var(--lh-d2) var(--font-display)'}}>Your week at work</h1>
      <a href="./b2b-org-info.html" aria-label="Your benefit" style={{width:44,height:44,borderRadius:'50%',border:'1.5px solid var(--dm-line-strong)',background:'var(--dm-surface)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--dm-ink)',font:'700 15px var(--font-display)',flex:'none'}}>i</a>
    </div>
    <div className="scroll" style={{marginTop:12}}>
      <div style={{background:'var(--dm-pine-700)',borderRadius:'var(--r-card)',boxShadow:'var(--sh-2)',padding:'15px 17px',color:'#fff'}} data-screen-label="Sponsor benefit card">
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{width:44,height:44,borderRadius:14,background:'var(--dm-surface)',display:'flex',alignItems:'center',justifyContent:'center',font:'800 19px var(--font-display)',color:'var(--dm-sky-700)',flex:'none',boxShadow:'var(--sh-1)'}}>T</div>
          <div style={{flex:1,minWidth:0}}>
            <span className="micro" style={{color:'var(--dm-green-100)'}}>Sponsored by Tawuniya</span>
            <b style={{display:'block',font:'800 22px/26px var(--font-display)',fontVariantNumeric:'tabular-nums'}}>{used} of 8 <span style={{font:'600 12.5px var(--font-ui)',color:'var(--dm-green-100)'}}>lunches covered this week</span></b>
          </div>
        </div>
        <div style={{height:7,borderRadius:4,background:'rgba(255,255,255,.16)',marginTop:12,overflow:'hidden'}}><i style={{display:'block',height:'100%',width:Math.min(100,used/8*100)+'%',borderRadius:4,background:used>=8?'var(--dm-amber-500)':'var(--dm-green-300)',transition:'width .3s var(--ease-serve)'}}/></div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:9,gap:10}}>
          <span style={{font:'500 11.5px/15px var(--font-ui)',color:'var(--dm-green-100)'}}>{used>=8?'Extra meals this week are on you at checkout':`${8-used} more on Tawuniya · resets Sunday`}</span>
          <button onClick={()=>setSheet(true)} style={{appearance:'none',border:0,cursor:'pointer',background:'rgba(255,255,255,.13)',color:'#fff',borderRadius:'var(--r-pill)',padding:'4px 11px',font:'600 11px var(--font-ui)',flex:'none'}}>{BRANCHES[branch].split(' · ')[0]} ▾</button>
        </div>
      </div>
      {needs.length>0
      ?<div style={{marginTop:10,background:'var(--dm-amber-100)',borderRadius:'var(--r-ctl)',padding:'10px 13px',display:'flex',alignItems:'center',gap:9}} data-screen-label="Week verdict — needs input">
        <i style={{width:8,height:8,borderRadius:'50%',background:'var(--dm-amber-500)',flex:'none'}}/>
        <span style={{flex:1,font:'500 12.5px/17px var(--font-ui)',color:'var(--dm-amber-700)'}}><b>{needs.map(x=>FULL[x.wd]).join(' & ')} still needs a meal</b> — pick by Tue 9:00 PM</span>
        <a href="./meal-selection-calendar.html" style={{font:'700 12px var(--font-ui)',flex:'none'}}>Pick →</a>
      </div>
      :<div style={{marginTop:10,background:'var(--dm-pine-100)',borderRadius:'var(--r-ctl)',padding:'10px 13px',display:'flex',alignItems:'center',gap:9}} data-screen-label="Week verdict — sorted">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--dm-pine-700)" strokeWidth="2.8" strokeLinecap="round" strokeLinejoin="round" style={{flex:'none'}}><path d="M4.5 12.5 10 18 19.5 6.5"/></svg>
        <span style={{font:'500 12.5px/17px var(--font-ui)',color:'var(--dm-pine-700)'}}><b>Your week is sorted</b> — {used} {used===1?'lunch':'lunches'} on the schedule</span>
      </div>}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',margin:'18px 2px 0'}}>
        <span className="micro">Standing schedule</span>
        <span style={{font:'500 11px var(--font-ui)',color:'var(--dm-ink-3)'}}>locked days are cooking</span>
      </div>
      {days.map((x,i)=>{
        if(x.locked)return <DayRow key={x.wd} wd={x.wd} dt={x.dt} label={'Day row '+x.wd+' — locked'}
          cell={<span style={{color:'var(--dm-ink-3)',display:'inline-block'}}><LockIcon s={12}/></span>}
          title={x.meal} meta={x.k+(x.qty>1?` · ×${x.qty}`:'')} aside={<LockChip/>}/>;
        if(!x.on)return <DayRow key={x.wd} wd={x.wd} dt={x.dt} tone="off" label={'Day row '+x.wd+' — day off'}
          cell={<Switch on={false} onChange={()=>upd(i,{on:true})}/>}
          title="Day off" titleMuted meta="flip the switch if you're in"/>;
        if(!x.meal)return <DayRow key={x.wd} wd={x.wd} dt={x.dt} tone="need" label={'Day row '+x.wd+' — needs pick'}
          cell={<Switch on onChange={()=>upd(i,{on:false})}/>}
          title="No meal yet" titleMuted meta={FULL[x.wd]+"'s menu has 12 options"}
          aside={<a href="./meal-selection-calendar.html" style={{display:'block'}}><Button size="sm">Pick meal</Button></a>}/>;
        return <DayRow key={x.wd} wd={x.wd} dt={x.dt} label={'Day row '+x.wd+' — editable'}
          cell={<Switch on onChange={()=>upd(i,{on:false})}/>}
          title={x.meal} meta={x.k}
          aside={<React.Fragment>
            <a href="./meal-selection-calendar.html" style={{font:'600 12px var(--font-ui)'}}>Swap</a>
            <div style={{display:'flex',alignItems:'center',border:'1.5px solid var(--dm-line-strong)',borderRadius:'var(--r-pill)',background:'var(--dm-surface)'}}>
              <button onClick={()=>upd(i,{qty:Math.max(1,x.qty-1)})} aria-label="Less" style={{appearance:'none',border:0,background:'none',cursor:'pointer',width:25,height:26,font:'700 13px var(--font-ui)',color:x.qty>1?'var(--dm-ink)':'var(--dm-ink-3)'}}>−</button>
              <b style={{font:'700 12.5px var(--font-display)',width:12,textAlign:'center'}}>{x.qty}</b>
              <button onClick={()=>upd(i,{qty:Math.min(3,x.qty+1)})} aria-label="More" style={{appearance:'none',border:0,background:'none',cursor:'pointer',width:25,height:26,font:'700 13px var(--font-ui)',color:'var(--dm-ink)'}}>+</button>
            </div>
          </React.Fragment>}/>;
      })}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',margin:'18px 2px 0'}}>
        <span className="micro">Arriving next</span>
        <a href="./subscription-dashboard.html" style={{font:'600 12px var(--font-ui)'}}>Track today</a>
      </div>
      <div className="card" style={{padding:'12px 14px',display:'flex',alignItems:'center',gap:11,marginTop:10}}>
        <div className="dm-photo" style={{width:46,height:46,flex:'none',borderRadius:12}}><span className="dm-photo-note" style={{fontSize:6.5}}>photo</span></div>
        <div style={{flex:1,minWidth:0}}>
          <b style={{display:'block',font:'600 14px/18px var(--font-display)'}}>Tomorrow · Mon 19</b>
          <span style={{font:'500 11px var(--font-ui)',color:'var(--dm-ink-3)'}}>Grilled Salmon & Quinoa · Olaya HQ</span>
        </div>
        <StatusBadge status="accepted" size="sm"/>
      </div>
      <div style={{margin:'14px 2px 0',font:'400 11.5px/15px var(--font-ui)',color:'var(--dm-ink-3)'}}>Prefer day-by-day ordering? <a href="./b2b-open.html" style={{fontWeight:600}}>Switch to open ordering</a> — Tawuniya allows both.</div>
    </div>
    {sheet&&<div style={{position:'absolute',inset:0,background:'rgba(31,38,30,.42)',zIndex:6}} data-screen-label="Branch sheet">
      <div style={{position:'absolute',insetInline:0,bottom:0,background:'var(--dm-paper)',borderRadius:'var(--r-sheet) var(--r-sheet) 0 0',boxShadow:'var(--sh-3)',padding:'10px 24px 26px',animation:'sheetUp var(--dur-sheet) var(--ease-serve) both'}}>
        <div style={{width:40,height:4.5,borderRadius:'var(--r-pill)',background:'var(--dm-line-strong)',margin:'4px auto 12px'}}/>
        <b style={{font:'700 var(--fs-d2)/var(--lh-d2) var(--font-display)'}}>Deliver to which branch?</b>
        <span style={{display:'block',font:'400 12.5px/17px var(--font-ui)',color:'var(--dm-ink-2)',margin:'4px 0 12px'}}>Tawuniya's addresses. Changes apply to unlocked orders — from Tue 20.</span>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {BRANCHES.map((b,i)=><button key={b} onClick={()=>{setBranch(i);setSheet(false);}} style={{appearance:'none',cursor:'pointer',textAlign:'start',display:'flex',alignItems:'center',gap:11,background:'var(--dm-surface)',border:branch===i?'2px solid var(--dm-green-500)':'1px solid var(--dm-line)',borderRadius:'var(--r-ctl)',padding:'12px 14px'}}>
            <i style={{width:12,height:12,borderRadius:'50%',flex:'none',border:branch===i?'4px solid var(--dm-green-500)':'2px solid var(--dm-line-strong)'}}/>
            <span style={{font:'600 14px var(--font-ui)'}}>{b}</span>
          </button>)}
        </div>
      </div>
    </div>}
    <TabBar active="subs"/>
  </div>;}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
