<!-- @dsCard group="App Screens (Green)" viewport="390x844" name="Home — Arabic (Green)" subtitle="RTL discovery feed under the brand green" -->
<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ديلي ميلز — الرئيسية</title>
<link rel="stylesheet" href="../../styles-green.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
html,body{height:100%}
body{width:390px;height:844px;margin:0 auto;overflow:hidden}
#root,.app{height:100%;display:flex;flex-direction:column;position:relative}
.scroll{flex:1;overflow-y:auto;scrollbar-width:none}
.scroll::-webkit-scrollbar{display:none}
.hstrip{display:flex;gap:8px;overflow-x:auto;padding:0 20px;scrollbar-width:none}
.hstrip::-webkit-scrollbar{display:none}
.micro{font:600 11.5px/var(--lh-micro) var(--font-ui);color:var(--dm-ink-3)}
</style></head>
<body data-screen-label="Home (AR, Green)"><div id="root"></div>
<script type="text/babel">
const {Button,Chip,TabBar}=window.DailymealzAppRedesignBrief_310f67;
const AI=s=>String(s).replace(/\d/g,d=>'٠١٢٣٤٥٦٧٨٩'[d]);
const PLANS=[
{name:'التوازن',sub:'غداء · الأحد–الخميس · قوائم متنوعة يومياً',meals:20,per:38,total:760,tags:['قوائم متعددة','الجمعة إجازة'],pick:true,note:'photo · mixed tray, overhead'},
{name:'الخفيف',sub:'أقل من ٥٥٠ سعرة · مبني على هدفك اليومي',meals:20,per:42,total:840,tags:['مطابق للسعرات'],calc:true,note:'photo · salad bowl, side light'},
{name:'التنفيذي',sub:'أطباق مميزة · أطباق شيف أسبوعياً',meals:12,per:56,total:672,tags:['وجبات مميزة','توصيل الجمعة'],note:'photo · plated main, close crop'}];
const CATS=[['متوازن','bowl'],['بروتين عالي','grill'],['كارب أقل','greens'],['نباتي','plant'],['طاولة الشيف','plated']];
function StatusBar(){return <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 24px 6px',font:'600 14px var(--font-ui)'}}>
  <span>١٢:٠٤</span>
  <span style={{display:'flex',gap:5,alignItems:'center'}}>
    <span style={{display:'flex',gap:1.5,alignItems:'flex-end'}}>{[4,6,8,10].map(h=><i key={h} style={{width:3,height:h,background:'var(--dm-ink)',borderRadius:1}}/>)}</span>
    <i style={{width:22,height:11,border:'1.5px solid var(--dm-ink)',borderRadius:3.5,display:'inline-flex',padding:1.5}}><i style={{width:'72%',background:'var(--dm-ink)',borderRadius:1.5}}/></i>
  </span></div>;}
function PlanCard({p,i}){return <a href="./plan-details.html" style={{display:'block',color:'var(--dm-ink)',background:'var(--dm-surface)',border:'1px solid var(--dm-line)',borderRadius:'var(--r-card)',boxShadow:'var(--sh-1)',overflow:'hidden',marginTop:12,animation:`dm-serve var(--dur-serve) var(--ease-serve) ${i*40}ms both`}}>
  <div className="dm-photo" style={{height:150,borderRadius:0,position:'relative'}}>
    <span className="dm-photo-note">{p.note}</span>
    {p.pick&&<span style={{position:'absolute',top:10,insetInlineStart:10,zIndex:2,background:'var(--dm-green-100)',color:'var(--dm-green-700)',borderRadius:'var(--r-pill)',padding:'4px 11px',font:'700 11px var(--font-ui)'}}>الأكثر اختياراً</span>}
    {p.calc&&<span style={{position:'absolute',top:10,insetInlineStart:10,zIndex:2,background:'var(--dm-teal-100)',color:'var(--dm-teal-700)',borderRadius:'var(--r-pill)',padding:'4px 11px',font:'700 11px var(--font-ui)'}}>يبدأ بهدف سعراتك</span>}
  </div>
  <div style={{padding:'13px 15px 15px'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:10}}>
      <div style={{minWidth:0}}>
        <b style={{font:'700 19px/26px var(--font-display)'}}>{p.name}</b>
        <span style={{display:'block',font:'400 12px/17px var(--font-ui)',color:'var(--dm-ink-2)'}}>{p.sub}</span>
      </div>
      <div style={{textAlign:'end',flex:'none'}}>
        <b style={{font:'700 22px/24px var(--font-display)'}}>{AI(p.per)}</b><span style={{font:'600 11px var(--font-ui)',color:'var(--dm-ink-2)'}}> ر.س/وجبة</span>
        <span style={{display:'block',font:'400 11px var(--font-ui)',color:'var(--dm-ink-3)'}}>{AI(p.meals)} غداء · {AI(p.total)} ر.س</span>
      </div>
    </div>
    <div style={{display:'flex',gap:6,marginTop:10,flexWrap:'wrap',alignItems:'center'}}>
      {p.tags.map(t=><span key={t} style={{background:'var(--dm-sand)',borderRadius:'var(--r-pill)',padding:'4px 10px',font:'600 11px var(--font-ui)',color:'var(--dm-ink-2)'}}>{t}</span>)}
      <span style={{font:'500 11px var(--font-ui)',color:'var(--dm-teal-700)'}}>أو ٤ × {AI(Math.round(p.total/4))} ر.س مع تمارا</span>
    </div>
  </div></a>;}
function App(){
  const [ptype,setPtype]=React.useState('plans');
  const [filter,setFilter]=React.useState('all');
  const nav=t=>{if(t==='subs')location.href='./subscription-dashboard-ar.html';};
  return <div className="app">
    <div className="dm-dots" style={{paddingBottom:12}}>
      <StatusBar/>
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'8px 20px 0'}}>
        <a href="./location-address.html" style={{flex:1,minWidth:0,display:'flex',alignItems:'center',gap:8,color:'var(--dm-ink)'}}>
          <div style={{width:36,height:36,borderRadius:'50%',background:'var(--dm-saffron-100)',display:'flex',alignItems:'center',justifyContent:'center',flex:'none'}}><i style={{width:11,height:11,borderRadius:'50%',background:'var(--dm-saffron-600)'}}/></div>
          <span style={{minWidth:0}}>
            <span className="micro" style={{display:'block'}}>التوصيل إلى</span>
            <b style={{font:'600 14.5px var(--font-display)',whiteSpace:'nowrap'}}>مكتب العليا <svg width="11" height="11" viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" style={{display:'inline'}}><path d="m5 8 5 5 5-5"/></svg></b>
          </span>
        </a>
        <button aria-label="الدعم" style={{width:44,height:44,borderRadius:'50%',border:'1.5px solid var(--dm-line-strong)',background:'var(--dm-surface)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:3,flex:'none'}}>{[0,1,2].map(i=><i key={i} style={{width:4,height:4,borderRadius:'50%',background:'var(--dm-ink-2)'}}/>)}</button>
        <a href="./cart-checkout-ar.html" aria-label="السلة" style={{position:'relative',width:44,height:44,borderRadius:'50%',border:'1.5px solid var(--dm-line-strong)',background:'var(--dm-surface)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--dm-ink)',flex:'none'}}>
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M4 7h16l-1.5 12a2 2 0 0 1-2 1.8h-9A2 2 0 0 1 5.5 19L4 7z"/><path d="M8.5 10V6a3.5 3.5 0 0 1 7 0v4"/></svg>
          <i style={{position:'absolute',top:2,insetInlineEnd:2,width:10,height:10,borderRadius:'50%',background:'var(--dm-saffron-500)',border:'2px solid var(--dm-surface)'}}/>
        </a>
      </div>
    </div>
    <div className="scroll" data-screen-label="الرئيسية">
      <div className="hstrip" style={{paddingTop:4}}>
        <div style={{flex:'none',width:310,background:'var(--dm-saffron-100)',borderRadius:'var(--r-card)',padding:'16px 18px',display:'flex',flexDirection:'column',gap:4,animation:'dm-serve var(--dur-serve) var(--ease-serve) both'}}>
          <b style={{font:'700 18px/24px var(--font-display)',color:'var(--dm-saffron-700)'}}>صناديق رمضان وصلت</b>
          <span style={{font:'400 12px/17px var(--font-ui)',color:'var(--dm-ink-2)'}}>خطط سحور وإفطار، توصل قبل المغرب.</span>
          <span style={{font:'700 12.5px var(--font-ui)',color:'var(--dm-saffron-700)',marginTop:4}}>← شاهد الخطط</span>
        </div>
        <div style={{flex:'none',width:310,background:'var(--dm-teal-100)',borderRadius:'var(--r-card)',padding:'16px 18px',display:'flex',flexDirection:'column',gap:4}}>
          <b style={{font:'700 18px/24px var(--font-display)',color:'var(--dm-teal-700)'}}>ادعُ صديقاً إلى السفرة</b>
          <span style={{font:'400 12px/17px var(--font-ui)',color:'var(--dm-ink-2)'}}>تحصلان معاً على ٣٠ نقطة عند اشتراكه.</span>
          <span style={{font:'700 12.5px var(--font-ui)',color:'var(--dm-teal-700)',marginTop:4}}>← شارك رمزك</span>
        </div>
      </div>
      <div className="hstrip" style={{marginTop:14}}>
        {[['plans','خطط الوجبات'],['catering','تموين المكاتب']].map(([k,l])=><Chip key={k} selected={ptype===k} onClick={()=>setPtype(k)}>{l}</Chip>)}
      </div>
      <div className="hstrip" style={{marginTop:16,gap:14}}>
        {CATS.map(([c,n])=><a key={c} href="#cat" onClick={e=>e.preventDefault()} style={{flex:'none',display:'flex',flexDirection:'column',alignItems:'center',gap:6,width:66,color:'var(--dm-ink)'}}>
          <div className="dm-photo" style={{width:60,height:60,borderRadius:'50%'}}><span className="dm-photo-note" style={{fontSize:6.5}}>{n}</span></div>
          <span style={{font:'600 11px/14px var(--font-ui)',textAlign:'center'}}>{c}</span>
        </a>)}
      </div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',margin:'20px 20px 0'}}>
        <span className="micro">الخطط في العليا</span>
        <a href="#filters" onClick={e=>e.preventDefault()} style={{font:'600 12px var(--font-ui)'}}>كل الفلاتر</a>
      </div>
      <div className="hstrip" style={{marginTop:10}}>
        {[['all','الكل'],['light','أقل من ٥٥٠ سعرة'],['protein','بروتين عالي'],['premium','مميّز'],['friday','توصيل الجمعة']].map(([k,l])=><Chip key={k} selected={filter===k} onClick={()=>setFilter(k)} style={{flex:'none'}}>{l}</Chip>)}
      </div>
      <div style={{padding:'0 20px'}}>
        {PLANS.filter(p=>filter==='all'||(filter==='light'&&p.calc)||(filter==='protein'&&p.name==='التوازن')||(filter==='premium'&&p.tags.includes('وجبات مميزة'))||(filter==='friday'&&p.tags.includes('توصيل الجمعة'))).map((p,i)=><PlanCard key={p.name} p={p} i={i}/>)}
        <div style={{display:'flex',alignItems:'center',gap:10,marginTop:18}}>
          <span className="micro" style={{flex:'none'}}>٢٦ مطبخاً شريكاً</span><i style={{flex:1,height:1,background:'var(--dm-line)'}}/>
        </div>
        <div style={{display:'flex',gap:8,marginTop:10}}>
          {['وفرة','نبتة','زاد','ليمونة'].map(k=><div key={k} title={k} style={{width:44,height:44,borderRadius:'50%',background:'var(--dm-surface)',border:'1px solid var(--dm-line)',display:'flex',alignItems:'center',justifyContent:'center',font:'700 13px var(--font-display)',color:'var(--dm-ink-2)'}}>{k[0]}</div>)}
          <div style={{width:44,height:44,borderRadius:'50%',background:'var(--dm-sand)',display:'flex',alignItems:'center',justifyContent:'center',font:'600 11px var(--font-ui)',color:'var(--dm-ink-2)'}}>+٢٢</div>
        </div>
        <div style={{background:'var(--dm-ink)',borderRadius:'var(--r-card)',padding:'16px 18px',margin:'16px 0 24px',display:'flex',justifyContent:'space-between',alignItems:'center',gap:10}}>
          <div><b style={{font:'700 16px/22px var(--font-display)',color:'var(--dm-paper)'}}>ديلي ميلز للشركات</b>
          <span style={{display:'block',font:'400 11.5px/16px var(--font-ui)',color:'var(--dm-sand-2)'}}>شركتك تتكفل بالغداء — ونحن نجهّز السفرة.</span></div>
          <Button size="sm" style={{flex:'none'}}>كلّمنا</Button>
        </div>
      </div>
    </div>
    <TabBar active="home" locale="ar" onChange={nav}/>
  </div>;}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
