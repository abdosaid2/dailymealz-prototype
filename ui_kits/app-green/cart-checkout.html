<!-- @dsCard group="App Screens (Green)" viewport="390x844" name="Cart, Payment & Success — Green" subtitle="Money moment in green; settled success goes pine, never a bright fill" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dailymealz — Checkout</title>
<link rel="stylesheet" href="../../styles-green.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
html,body{height:100%}
body{width:390px;height:844px;margin:0 auto;overflow:hidden}
#root,.app{height:100%;display:flex;flex-direction:column;position:relative}
.scroll{flex:1;overflow-y:auto;padding:0 20px 150px;scrollbar-width:none}
.scroll::-webkit-scrollbar{display:none}
.card{background:var(--dm-surface);border:1px solid var(--dm-line);border-radius:var(--r-card);box-shadow:var(--sh-1);padding:16px;margin-top:12px}
.micro{font:600 var(--fs-micro)/var(--lh-micro) var(--font-ui);letter-spacing:.06em;text-transform:uppercase;color:var(--dm-ink-3)}
.row{display:flex;justify-content:space-between;font:400 13.5px/24px var(--font-ui);color:var(--dm-ink-2)}
.row b{color:var(--dm-ink);font-variant-numeric:tabular-nums;font-weight:600}
.pfield{flex:1;height:46px;border:1.5px solid var(--dm-line-strong);border-radius:var(--r-ctl);background:var(--dm-surface);padding:0 13px;font:600 14px var(--font-ui);color:var(--dm-ink);text-transform:uppercase;letter-spacing:.04em}
.pfield:focus{border-color:var(--dm-saffron-500);box-shadow:none;outline:none}
@keyframes spin{to{transform:rotate(1turn)}}
@keyframes popin{from{transform:scale(.6);opacity:0}to{transform:none;opacity:1}}
</style></head>
<body data-screen-label="Cart & Payment (Green)"><div id="root"></div>
<script type="text/babel">
const {Button}=window.DailymealzAppRedesignBrief_310f67;
const WINDOWS=['12:00–1:00 PM','11:00–12:00 PM','1:00–2:00 PM'];
const fmt=n=>n.toFixed(2);
function AppleMark(){return <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden><path d="M16.7 12.9c0-2.4 2-3.6 2.1-3.7-1.1-1.7-2.9-1.9-3.5-1.9-1.5-.2-2.9.9-3.7.9-.8 0-1.9-.9-3.2-.9-1.6 0-3.1 1-4 2.4-1.7 2.9-.4 7.3 1.2 9.7.8 1.2 1.8 2.5 3 2.4 1.2 0 1.7-.8 3.2-.8s1.9.8 3.2.8c1.3 0 2.2-1.2 3-2.4.9-1.4 1.3-2.7 1.3-2.8-.1 0-2.6-1-2.6-3.7zM14.4 5.7c.7-.8 1.1-1.9 1-3-1 0-2.1.7-2.8 1.5-.6.7-1.2 1.8-1 2.9 1.1.1 2.2-.6 2.8-1.4z"/></svg>;}
function Radio({on}){return <i style={{width:20,height:20,borderRadius:'50%',flex:'none',boxSizing:'border-box',border:on?'6.5px solid var(--dm-saffron-500)':'2px solid var(--dm-line-strong)',background:'var(--dm-surface)'}}/>;}
function Success({notif,setNotif}){
  return <div className="app" data-screen-label="Success" style={{padding:'0 24px',overflowY:'auto'}}>
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',textAlign:'center',paddingTop:76}}>
      <div style={{width:132,height:132,borderRadius:'50%',background:'var(--dm-pine-100)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'var(--sh-2)',animation:'popin .5s var(--ease-serve) both'}}>
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="var(--dm-pine-700)" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round"><path d="M4.5 12.5 10 18 19.5 6.5"/></svg>
      </div>
      <h1 style={{margin:'22px 0 0',font:'700 var(--fs-d1)/var(--lh-d1) var(--font-display)'}}>Your table is set!</h1>
      <p style={{margin:'8px 0 0',font:'400 15px/22px var(--font-ui)',color:'var(--dm-ink-2)'}}>First delivery <b style={{color:'var(--dm-ink)'}}>Sun 25 Jan, 12:00–1:00 PM</b> at Olaya office.</p>
    </div>
    <div style={{background:'var(--dm-surface)',border:'1px solid var(--dm-line)',borderRadius:'var(--r-card)',boxShadow:'var(--sh-1)',padding:'6px 16px',marginTop:24}}>
      {[['Tonight','Kitchens confirm your week of meals'],['Any evening','Swap the next day’s meal until 9:00 PM'],['Every noon','Track your driver to the door']].map(([t,l],i)=>
      <div key={t} style={{display:'flex',gap:12,alignItems:'center',padding:'11px 0',borderTop:i?'1px dashed var(--dm-line)':'none'}}>
        <i style={{width:9,height:9,borderRadius:'50%',background:'var(--dm-saffron-500)',flex:'none'}}/>
        <div style={{textAlign:'start'}}><b style={{font:'600 13.5px var(--font-ui)'}}>{t}</b><span style={{display:'block',font:'400 12px/16px var(--font-ui)',color:'var(--dm-ink-2)'}}>{l}</span></div>
      </div>)}
    </div>
    <div className="dm-dots" style={{background:'var(--dm-sand)',borderRadius:'var(--r-card)',padding:'14px 16px',marginTop:12,display:'flex',alignItems:'center',gap:12}}>
      {notif?<span style={{font:'500 13px/18px var(--font-ui)',color:'var(--dm-olive-700)'}}>You’re set — we’ll nudge you before swap closes and when your driver is near.</span>
      :<React.Fragment>
        <div style={{flex:1}}><b style={{font:'600 14px/18px var(--font-display)'}}>Know when lunch is close</b>
        <span style={{display:'block',font:'400 11.5px/15px var(--font-ui)',color:'var(--dm-ink-2)'}}>Delivery updates + a nudge before swaps lock.</span></div>
        <Button variant="secondary" size="sm" onClick={()=>setNotif(true)} style={{flex:'none'}}>Turn on</Button>
      </React.Fragment>}
    </div>
    <div style={{padding:'18px 0 30px'}}>
      <a href="./subscription-dashboard.html" style={{display:'block'}}><Button block size="lg" style={{width:'100%'}}>Go to my meals</Button></a>
    </div>
  </div>;}
function App(){
  const [win,setWin]=React.useState(0);
  const [dessert,setDessert]=React.useState(false);
  const [promoIn,setPromoIn]=React.useState('');
  const [promo,setPromo]=React.useState(null);
  const [promoErr,setPromoErr]=React.useState('');
  const [wallet,setWallet]=React.useState(true);
  const [pay,setPay]=React.useState('applepay');
  const [busy,setBusy]=React.useState(false);
  const [declined,setDeclined]=React.useState(false);
  const [phase,setPhase]=React.useState('cart');
  const [notif,setNotif]=React.useState(false);
  const subtotal=760,addons=dessert?29:0,disc=promo?38:0,wal=wallet?18:0;
  const total=subtotal+addons-disc-wal,vat=total-total/1.15;
  const applyPromo=()=>{const c=promoIn.trim().toUpperCase();if(c==='SUFRA20'){setPromo(c);setPromoErr('');}else setPromoErr('That code isn’t valid or has expired.');};
  const doPay=()=>{setBusy(true);setDeclined(false);setTimeout(()=>{setBusy(false);if(pay==='card'){setDeclined(true);}else setPhase('done');},1100);};
  if(phase==='done')return <Success notif={notif} setNotif={setNotif}/>;
  return <div className="app">
    <div style={{padding:'18px 20px 0'}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <a href="./review-meals.html" aria-label="Back" style={{width:44,height:44,borderRadius:'50%',border:'1.5px solid var(--dm-line-strong)',background:'var(--dm-surface)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--dm-ink)',flex:'none'}}>
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.5 4.5 7 10l5.5 5.5"/></svg></a>
        <div style={{flex:1}}>
          <h1 style={{margin:0,font:'600 21px/26px var(--font-display)'}}>Checkout</h1>
          <span style={{font:'400 var(--fs-caption)/var(--lh-caption) var(--font-ui)',color:'var(--dm-ink-2)'}}>Step 4 of 5 — payment is last</span>
        </div>
      </div>
      <div style={{display:'flex',gap:5,marginTop:12}}>{[1,1,1,1,0].map((f,i)=><i key={i} style={{flex:1,height:4,borderRadius:2,background:f?'var(--dm-saffron-500)':'var(--dm-sand-2)'}}/>)}</div>
    </div>
    <div className="scroll">
      {declined&&<div role="alert" style={{marginTop:14,background:'var(--st-failed-bg)',borderRadius:'var(--r-ctl)',padding:'12px 14px',font:'500 13px/18px var(--font-ui)',color:'var(--st-failed-fg)',animation:'dm-serve var(--dur-serve) var(--ease-serve) both'}} data-screen-label="Payment declined">
        Your bank declined the payment — nothing was charged and your cart is safe. Try another method below.
      </div>}
      <section className="card" data-screen-label="Order summary">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span className="micro">Your order</span>
          <a href="./review-meals.html" style={{font:'600 12px var(--font-ui)'}}>Review meals</a>
        </div>
        <div style={{display:'flex',gap:12,alignItems:'center',marginTop:10}}>
          <div className="dm-photo" style={{width:54,height:54,flex:'none'}}><span className="dm-photo-note" style={{fontSize:7}}>photo</span></div>
          <div><b style={{font:'700 17px/21px var(--font-display)'}}>Balanced · 20 lunches</b>
          <span style={{display:'block',font:'400 12px/16px var(--font-ui)',color:'var(--dm-ink-2)'}}>Sun 25 Jan → Thu 19 Feb · Fridays off · 3 premium picks</span></div>
        </div>
        <div style={{borderTop:'1px dashed var(--dm-line)',marginTop:12,paddingTop:11,display:'flex',flexDirection:'column',gap:8}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
            <span style={{font:'400 13px var(--font-ui)',color:'var(--dm-ink-2)'}}>To <b style={{color:'var(--dm-ink)',fontWeight:600}}>Olaya office · Tawuniya Tower, fl 11</b></span>
            <a href="./location-address.html" style={{font:'600 12px var(--font-ui)',flex:'none'}}>Change</a>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
            <span style={{font:'400 13px var(--font-ui)',color:'var(--dm-ink-2)'}}>Window <b style={{color:'var(--dm-ink)',fontWeight:600}}>{WINDOWS[win]}</b></span>
            <button onClick={()=>setWin((win+1)%3)} style={{appearance:'none',border:0,background:'none',cursor:'pointer',font:'600 12px var(--font-ui)',color:'var(--dm-saffron-700)',padding:0}}>Change</button>
          </div>
        </div>
      </section>
      <section className="card" style={{display:'flex',alignItems:'center',gap:12}} data-screen-label="Add-on">
        <div className="dm-photo" style={{width:46,height:46,flex:'none',borderRadius:12}}><span className="dm-photo-note" style={{fontSize:6.5}}>photo</span></div>
        <div style={{flex:1}}><b style={{font:'600 14px/18px var(--font-display)'}}>Friday dessert box</b>
        <span style={{display:'block',font:'400 11.5px/15px var(--font-ui)',color:'var(--dm-ink-2)'}}>4 weekend treats for the family · +29 SAR</span></div>
        <button role="switch" aria-checked={dessert} onClick={()=>setDessert(!dessert)} style={{appearance:'none',cursor:'pointer',width:50,height:30,borderRadius:'var(--r-pill)',border:0,background:dessert?'var(--dm-saffron-500)':'var(--dm-sand-2)',position:'relative',flex:'none',transition:'background .18s'}}>
          <i style={{position:'absolute',top:3,insetInlineStart:dessert?23:3,width:24,height:24,borderRadius:'50%',background:'var(--dm-surface)',boxShadow:'var(--sh-1)',transition:'inset-inline-start .18s var(--ease-serve)'}}/>
        </button>
      </section>
      <section className="card" data-screen-label="Savings">
        <span className="micro">Savings</span>
        {promo?<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:10,background:'var(--dm-olive-100)',borderRadius:'var(--r-ctl)',padding:'10px 13px'}}>
          <span style={{font:'600 13px var(--font-ui)',color:'var(--dm-olive-700)'}}>{promo} applied — −38.00 SAR</span>
          <button onClick={()=>setPromo(null)} aria-label="Remove code" style={{appearance:'none',border:0,background:'none',cursor:'pointer',font:'700 13px var(--font-ui)',color:'var(--dm-olive-700)'}}>✕</button>
        </div>
        :<React.Fragment>
          <div style={{display:'flex',gap:8,marginTop:10}}>
            <input className="pfield" placeholder="Promo code" value={promoIn} onChange={e=>{setPromoIn(e.target.value);setPromoErr('');}}/>
            <Button variant="secondary" size="sm" onClick={applyPromo} style={{height:46}}>Apply</Button>
          </div>
          {promoErr?<span style={{display:'block',marginTop:6,font:'500 12px var(--font-ui)',color:'var(--dm-terra-700)'}}>{promoErr}</span>
          :<span style={{display:'block',marginTop:6,font:'500 9.5px var(--font-mono)',color:'var(--dm-ink-3)',letterSpacing:'.03em'}}>demo · SUFRA20 applies, others error</span>}
        </React.Fragment>}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:12,paddingTop:12,borderTop:'1px dashed var(--dm-line)'}}>
          <div><b style={{font:'600 13.5px var(--font-ui)'}}>Use wallet balance</b>
          <span style={{display:'block',font:'400 11.5px var(--font-ui)',color:'var(--dm-ink-2)'}}>18.00 SAR available</span></div>
          <button role="switch" aria-checked={wallet} onClick={()=>setWallet(!wallet)} style={{appearance:'none',cursor:'pointer',width:50,height:30,borderRadius:'var(--r-pill)',border:0,background:wallet?'var(--dm-saffron-500)':'var(--dm-sand-2)',position:'relative',transition:'background .18s'}}>
            <i style={{position:'absolute',top:3,insetInlineStart:wallet?23:3,width:24,height:24,borderRadius:'50%',background:'var(--dm-surface)',boxShadow:'var(--sh-1)',transition:'inset-inline-start .18s var(--ease-serve)'}}/>
          </button>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:10}}>
          <span style={{font:'400 13px var(--font-ui)',color:'var(--dm-ink-2)'}}>Redeem SNB bank points</span>
          <span style={{background:'var(--dm-sand)',borderRadius:'var(--r-pill)',padding:'3px 10px',font:'600 11px var(--font-ui)',color:'var(--dm-ink-2)'}}>Verifies by OTP</span>
        </div>
      </section>
      <section className="card" data-screen-label="Payment methods">
        <span className="micro">Pay with</span>
        <div style={{display:'flex',flexDirection:'column',marginTop:6}}>
          {[['applepay',<span style={{display:'flex',alignItems:'center',gap:6,font:'700 15px var(--font-ui)'}}><AppleMark/> Pay</span>,'mada, Visa, Mastercard — Face ID'],
            ['card','mada card ·· 4021','Re-enter CVV · 3-D Secure'],
            ['tamara','Tamara — 4 payments','4 × '+fmt(total/4)+' SAR · no fees'],
            ['cash','Cash on delivery','Exact change helps the driver']].map(([k,t,s])=>
          <button key={k} onClick={()=>setPay(k)} style={{appearance:'none',cursor:'pointer',textAlign:'start',display:'flex',alignItems:'center',gap:12,background:'none',border:0,borderTop:k!=='applepay'?'1px dashed var(--dm-line)':'none',padding:'12px 2px'}}>
            <Radio on={pay===k}/>
            <div style={{flex:1}}><b style={{font:'600 14.5px var(--font-ui)',color:'var(--dm-ink)'}}>{t}</b>
            <span style={{display:'block',font:'400 11.5px var(--font-ui)',color:'var(--dm-ink-3)'}}>{s}</span></div>
            {k==='card'&&pay==='card'&&<input className="pfield" placeholder="CVV" maxLength="3" inputMode="numeric" style={{flex:'none',width:64,height:40,textAlign:'center',letterSpacing:'.2em'}} onClick={e=>e.stopPropagation()}/>}
          </button>)}
        </div>
        <span style={{display:'block',font:'400 11px/15px var(--font-ui)',color:'var(--dm-ink-3)',borderTop:'1px dashed var(--dm-line)',paddingTop:10}}>Cards are stored by our payment partner, never on your phone. SNB cards get 15% off — applied above.</span>
      </section>
      <section className="card" data-screen-label="Price breakdown">
        <div className="row"><span>Subtotal · 20 lunches</span><b>{fmt(subtotal)} SAR</b></div>
        {addons>0&&<div className="row"><span>Friday dessert box</span><b>{fmt(addons)} SAR</b></div>}
        {promo&&<div className="row" style={{color:'var(--dm-olive-700)'}}><span>Promo {promo}</span><b style={{color:'var(--dm-olive-700)'}}>−{fmt(disc)} SAR</b></div>}
        {wallet&&<div className="row" style={{color:'var(--dm-olive-700)'}}><span>Wallet</span><b style={{color:'var(--dm-olive-700)'}}>−{fmt(wal)} SAR</b></div>}
        <div className="row"><span>Includes VAT 15%</span><b>{fmt(vat)} SAR</b></div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',borderTop:'1px solid var(--dm-line)',marginTop:8,paddingTop:10}}>
          <span style={{font:'600 15px var(--font-ui)'}}>Total</span>
          <b style={{font:'700 24px var(--font-display)',fontVariantNumeric:'tabular-nums'}}>{fmt(total)} <span style={{font:'600 13px var(--font-ui)'}}>SAR</span></b>
        </div>
        <span style={{display:'block',textAlign:'end',font:'500 11.5px var(--font-ui)',color:'var(--dm-olive-700)'}}>≈ {(total/20).toFixed(1)} SAR per meal after savings</span>
      </section>
    </div>
    <div style={{position:'absolute',insetInline:0,bottom:0,padding:'12px 20px 26px',background:'rgba(247,246,238,.9)',backdropFilter:'blur(14px)',borderTop:'1px solid var(--dm-line)'}}>
      {pay==='applepay'
      ?<button onClick={doPay} disabled={busy} style={{width:'100%',height:56,borderRadius:'var(--r-pill)',border:0,cursor:'pointer',background:'var(--dm-ink)',color:'var(--dm-paper)',font:'600 16px var(--font-ui)',display:'flex',alignItems:'center',justifyContent:'center',gap:7}}>
        {busy?<i style={{width:18,height:18,border:'2.5px solid var(--dm-sand-2)',borderTopColor:'transparent',borderRadius:'50%',animation:'spin .7s linear infinite'}}/>:<React.Fragment>Pay {fmt(total)} SAR with <AppleMark/> Pay</React.Fragment>}
      </button>
      :<Button block size="lg" onClick={doPay} disabled={busy}>{busy?'Contacting your bank…':pay==='cash'?`Place order — ${fmt(total)} SAR on delivery`:`Pay ${fmt(total)} SAR`}</Button>}
      <span style={{display:'block',textAlign:'center',marginTop:8,font:'500 9.5px var(--font-mono)',color:'var(--dm-ink-3)',letterSpacing:'.03em'}}>demo · saved card declines, other methods succeed</span>
    </div>
  </div>;}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
