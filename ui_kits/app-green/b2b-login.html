<!-- @dsCard group="App Screens (Green)" viewport="390x844" name="B2B Login — phone (Green)" subtitle="Employee sign-in: phone-first because the company is matched by number; OTP success → recognition welcome" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dailymealz — Employee sign in</title>
<link rel="stylesheet" href="../../styles-green.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
html,body{height:100%}
body{width:390px;height:844px;margin:0 auto;overflow:hidden;background:var(--dm-paper)}
#root,.app{height:100%;position:relative}
@keyframes sheetUp{from{transform:translateY(60px);opacity:0}to{transform:none;opacity:1}}
@keyframes shake{0%,100%{transform:none}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}
.otp{width:58px;height:64px;border:1.5px solid var(--dm-line-strong);border-radius:var(--r-ctl);background:var(--dm-surface);text-align:center;font:700 30px var(--font-display);color:var(--dm-ink);caret-color:var(--dm-green-500)}
.otp:focus{border-color:var(--dm-green-500);box-shadow:none;outline:none}
.otp.err{border-color:var(--dm-terra-500);background:var(--dm-terra-100)}
.field{width:100%;height:54px;border:1.5px solid var(--dm-line-strong);border-radius:var(--r-ctl);background:var(--dm-surface);padding:0 16px;font:500 17px var(--font-ui);color:var(--dm-ink)}
.field:focus{border-color:var(--dm-green-500);box-shadow:none;outline:none}
</style></head>
<body data-screen-label="B2B Login (Green)"><div id="root"></div>
<script type="text/babel">
const {Button}=window.DailymealzAppRedesignBrief_310f67;
function Backdrop(){/* B2B: no plan behind the gate — a calm branded workplace panel */
  return <div aria-hidden style={{position:'absolute',inset:0,overflow:'hidden',background:'var(--dm-pine-700)'}}>
    <div className="dm-dots" style={{position:'absolute',inset:0,opacity:.5}}/>
    <div style={{position:'relative',padding:'64px 26px 0',color:'#fff'}}>
      <b style={{font:'800 26px var(--font-display)'}}>dailymealz<span style={{color:'var(--dm-green-300)'}}>.</span></b>
      <p style={{margin:'12px 0 0',font:'500 17px/25px var(--font-ui)',color:'var(--dm-green-100)',maxWidth:260}}>Your workplace lunch, in one app. Sign in and we’ll find your company.</p>
    </div>
    <div style={{position:'absolute',inset:0,background:'linear-gradient(to bottom,transparent 40%,rgba(10,90,52,.35))'}}/>
  </div>;}
function App(){
  const [step,setStep]=React.useState('phone');
  const [phone,setPhone]=React.useState('');
  const [phoneErr,setPhoneErr]=React.useState('');
  const [code,setCode]=React.useState(['','','','']);
  const [otpErr,setOtpErr]=React.useState('');
  const [left,setLeft]=React.useState(24);
  const [resends,setResends]=React.useState(0);
  const [sent,setSent]=React.useState(false);
  const cells=[React.useRef(),React.useRef(),React.useRef(),React.useRef()];
  React.useEffect(()=>{if(step!=='otp'||left<=0)return;const t=setTimeout(()=>setLeft(left-1),1000);return()=>clearTimeout(t);},[step,left]);
  const submitPhone=()=>{const p=phone.replace(/\s/g,'');if(!/^5\d{8}$/.test(p)){setPhoneErr('Enter a Saudi mobile starting with 5 — 9 digits.');return;}setPhoneErr('');setStep('otp');setLeft(24);setCode(['','','','']);setOtpErr('');};
  const put=(i,v)=>{
    if(otpErr){setOtpErr('')}
    const d=v.replace(/\D/g,'').slice(-1);const next=[...code];next[i]=d;setCode(next);
    if(d&&i<3)cells[i+1].current.focus();
    if(next.every(c=>c!=='')){
      setTimeout(()=>{if(next.join('')==='1234'){window.location.href='./b2b-welcome.html';}else{setOtpErr('That code didn’t match. Check the SMS and try again.');setCode(['','','','']);cells[0].current&&cells[0].current.focus();}},220);
    }};
  const back=(i,e)=>{if(e.key==='Backspace'&&!code[i]&&i>0)cells[i-1].current.focus();};
  const resend=()=>{if(resends>=2)return;setResends(resends+1);setLeft(24);setSent(true);setTimeout(()=>setSent(false),2200);};
  const sheet={position:'absolute',insetInline:0,bottom:0,background:'var(--dm-paper)',borderRadius:'var(--r-sheet) var(--r-sheet) 0 0',boxShadow:'var(--sh-3)',padding:'10px 24px 28px',animation:'sheetUp var(--dur-sheet) var(--ease-serve) both'};
  const handle=<div style={{width:40,height:4.5,borderRadius:'var(--r-pill)',background:'var(--dm-line-strong)',margin:'4px auto 16px'}}/>;
  return <div className="app">
    <Backdrop/>
    {step==='phone'&&<div style={sheet} data-screen-label="Employee phone sign-in">{handle}
      <h1 style={{margin:0,font:'700 var(--fs-d2)/var(--lh-d2) var(--font-display)'}}>Sign in to Dailymealz</h1>
      <p style={{margin:'6px 0 18px',font:'400 var(--fs-label)/var(--lh-label) var(--font-ui)',color:'var(--dm-ink-2)'}}>Use the mobile number your workplace registered — we match it to your company automatically.</p>
      <label style={{display:'block',font:'600 var(--fs-micro)/var(--lh-micro) var(--font-ui)',letterSpacing:'.06em',textTransform:'uppercase',color:'var(--dm-ink-3)',marginBottom:6}}>Mobile number</label>
      <div style={{display:'flex',gap:8}}>
        <button style={{appearance:'none',cursor:'pointer',border:'1.5px solid var(--dm-line-strong)',background:'var(--dm-surface)',borderRadius:'var(--r-ctl)',padding:'0 12px',font:'600 15px var(--font-ui)',color:'var(--dm-ink)',whiteSpace:'nowrap'}}>KSA +966</button>
        <input className="field" style={phoneErr?{borderColor:'var(--dm-terra-500)'}:null} inputMode="numeric" placeholder="5X XXX XXXX" value={phone} onChange={e=>setPhone(e.target.value)} dir="ltr"/>
      </div>
      {phoneErr&&<span style={{display:'block',marginTop:6,font:'500 12px var(--font-ui)',color:'var(--dm-terra-700)'}}>{phoneErr}</span>}
      <div style={{marginTop:12}}><Button block size="lg" onClick={submitPhone}>Send code</Button></div>
      <div style={{textAlign:'center',marginTop:14,font:'400 12.5px/18px var(--font-ui)',color:'var(--dm-ink-3)'}}>Company recognition works by phone number, so there’s no social sign-in here.</div>
      <div style={{textAlign:'center',marginTop:12}}><a href="./onboarding.html" style={{font:'500 12px var(--font-ui)',color:'var(--dm-ink-3)'}}>Not an employee? Use Dailymealz personally</a></div>
    </div>}
    {step==='otp'&&<div style={sheet} data-screen-label="OTP verification">{handle}
      <h1 style={{margin:0,font:'700 var(--fs-d2)/var(--lh-d2) var(--font-display)'}}>Enter the code</h1>
      <p style={{margin:'6px 0 20px',font:'400 var(--fs-label)/var(--lh-label) var(--font-ui)',color:'var(--dm-ink-2)'}}>Sent by SMS to <b dir="ltr" style={{color:'var(--dm-ink)'}}>+966 {phone.replace(/\s/g,'').replace(/(\d{2})(\d{3})(\d{4})/,'$1 $2 $3')}</b> · <a href="#change" onClick={e=>{e.preventDefault();setStep('phone');}} style={{fontWeight:600}}>Change number</a></p>
      <div dir="ltr" style={{display:'flex',gap:10,justifyContent:'center',animation:otpErr?'shake .38s':'none'}}>
        {code.map((c,i)=><input key={i} ref={cells[i]} className={'otp'+(otpErr?' err':'')} inputMode="numeric" autoFocus={i===0} value={c} onChange={e=>put(i,e.target.value)} onKeyDown={e=>back(i,e)} aria-label={'Digit '+(i+1)}/>)}
      </div>
      {otpErr?<span role="alert" style={{display:'block',textAlign:'center',marginTop:12,font:'500 12.5px var(--font-ui)',color:'var(--dm-terra-700)'}}>{otpErr}</span>
      :sent?<span style={{display:'block',textAlign:'center',marginTop:12,font:'500 12.5px var(--font-ui)',color:'var(--dm-olive-700)'}}>New code sent.</span>
      :<span style={{display:'block',textAlign:'center',marginTop:12,font:'400 12.5px var(--font-ui)',color:'var(--dm-ink-3)'}}>Code fills automatically from SMS.</span>}
      <div style={{textAlign:'center',marginTop:18,font:'400 13px var(--font-ui)',color:'var(--dm-ink-2)'}}>
        {resends>=2?<span style={{color:'var(--dm-terra-700)',fontWeight:500}}>Too many codes — try again in 5 minutes.</span>
        :left>0?<span>Resend code in <b style={{fontVariantNumeric:'tabular-nums'}}>0:{String(left).padStart(2,'0')}</b></span>
        :<a href="#resend" onClick={e=>{e.preventDefault();resend();}} style={{fontWeight:700}}>Resend code</a>}
      </div>
      <div style={{textAlign:'center',marginTop:26,font:'500 9.5px var(--font-mono)',color:'var(--dm-ink-3)',letterSpacing:'.03em'}}>demo · 1234 → recognized as a Tawuniya employee</div>
    </div>}
  </div>;}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
