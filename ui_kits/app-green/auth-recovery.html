<!-- @dsCard group="App Screens (Green)" viewport="390x844" name="Auth — Email, Reset & Verify" subtitle="Email login, forgot→sent→reset with live password rules, verify-email state" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dailymealz — Email sign in</title>
<link rel="stylesheet" href="../../styles-green.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
html,body{height:100%}
body{width:390px;height:844px;margin:0 auto;overflow:hidden}
#root,.app{height:100%;display:flex;flex-direction:column}
.field{width:100%;height:54px;border:1.5px solid var(--dm-line-strong);border-radius:var(--r-ctl);background:var(--dm-surface);padding:0 16px;font:500 16px var(--font-ui);color:var(--dm-ink)}
.field:focus{border-color:var(--dm-green-500);box-shadow:none;outline:none}
label{display:block;font:600 var(--fs-micro)/var(--lh-micro) var(--font-ui);letter-spacing:.06em;text-transform:uppercase;color:var(--dm-ink-3);margin:16px 0 6px}
</style></head>
<body data-screen-label="Auth Recovery (Green)"><div id="root"></div>
<script type="text/babel">
const {Button}=window.DailymealzAppRedesignBrief_310f67;
function Rule({ok,children}){return <span style={{display:'flex',alignItems:'center',gap:7,font:'500 12px var(--font-ui)',color:ok?'var(--dm-pine-700)':'var(--dm-ink-3)'}}>
  {ok?<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M4.5 12.5 10 18 19.5 6.5"/></svg>:<i style={{width:5,height:5,borderRadius:'50%',background:'var(--dm-line-strong)',margin:'0 3.5px'}}/>}{children}
</span>;}
function Shell({title,sub,back,children,label}){
  return <div className="app" data-screen-label={label}>
    <div style={{padding:'18px 24px 0'}}>
      {back}
      <h1 style={{margin:'16px 0 0',font:'700 var(--fs-d2)/var(--lh-d2) var(--font-display)'}}>{title}</h1>
      <p style={{margin:'6px 0 0',font:'400 var(--fs-label)/var(--lh-label) var(--font-ui)',color:'var(--dm-ink-2)'}}>{sub}</p>
    </div>
    <div style={{flex:1,display:'flex',flexDirection:'column',padding:'0 24px 28px',overflowY:'auto'}}>{children}</div>
  </div>;}
function App(){
  const [step,setStep]=React.useState('login');
  const [pw,setPw]=React.useState('');
  const back=to=><button onClick={()=>setStep(to)} aria-label="Back" style={{width:44,height:44,borderRadius:'50%',border:'1.5px solid var(--dm-line-strong)',background:'var(--dm-surface)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--dm-ink)',cursor:'pointer'}}><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.5 4.5 7 10l5.5 5.5"/></svg></button>;
  const backLink=<a href="./auth-login.html" aria-label="Back" style={{width:44,height:44,borderRadius:'50%',border:'1.5px solid var(--dm-line-strong)',background:'var(--dm-surface)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--dm-ink)'}}><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.5 4.5 7 10l5.5 5.5"/></svg></a>;
  if(step==='login')return <Shell label="Email login" title="Sign in with email" sub="Phone is faster — but email works everywhere." back={backLink}>
    <label>Email</label><input className="field" type="email" placeholder="you@example.com" defaultValue="faisal@example.com"/>
    <label>Password</label><input className="field" type="password" placeholder="••••••••"/>
    <div style={{textAlign:'end',marginTop:8}}><button onClick={()=>setStep('forgot')} style={{appearance:'none',border:0,background:'none',cursor:'pointer',padding:0,font:'600 13px var(--font-ui)',color:'var(--dm-green-700)'}}>Forgot password?</button></div>
    <div style={{flex:1}}/>
    <Button block size="lg" onClick={()=>setStep('verify')}>Sign in</Button>
    <span style={{textAlign:'center',marginTop:12,font:'400 13px var(--font-ui)',color:'var(--dm-ink-2)'}}>New here? <a href="./auth-login.html" style={{fontWeight:700}}>Continue with phone</a></span>
  </Shell>;
  if(step==='forgot')return <Shell label="Forgot password" title="Reset your password" sub="Enter the email on your account — we'll send a reset link." back={back('login')}>
    <label>Email</label><input className="field" type="email" defaultValue="faisal@example.com"/>
    <div style={{flex:1}}/>
    <Button block size="lg" onClick={()=>setStep('sent')}>Send reset link</Button>
  </Shell>;
  if(step==='sent')return <Shell label="Reset link sent" title="Check your inbox" sub="We sent a link to faisal@example.com. It works for 30 minutes." back={back('forgot')}>
    <div style={{marginTop:18,background:'var(--dm-sand)',borderRadius:'var(--r-card)',padding:'14px 16px',font:'500 12.5px/18px var(--font-ui)',color:'var(--dm-ink-2)'}}>Nothing arriving? Check spam, or resend in <b style={{fontVariantNumeric:'tabular-nums',color:'var(--dm-ink)'}}>0:42</b>. The demo continues below.</div>
    <div style={{flex:1}}/>
    <Button block size="lg" onClick={()=>setStep('reset')}>Open the link (demo)</Button>
  </Shell>;
  if(step==='reset'){
    const r1=pw.length>=8,r2=/\d/.test(pw),r3=/[A-Za-z]/.test(pw);
    return <Shell label="Reset form" title="Choose a new password" sub="You'll stay signed in on this phone." back={back('sent')}>
      <label>New password</label><input className="field" type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="At least 8 characters"/>
      <div style={{display:'flex',flexDirection:'column',gap:6,marginTop:12}}>
        <Rule ok={r1}>8+ characters</Rule><Rule ok={r2}>At least one number</Rule><Rule ok={r3}>At least one letter</Rule>
      </div>
      <div style={{flex:1}}/>
      <Button block size="lg" disabled={!(r1&&r2&&r3)} onClick={()=>setStep('done')}>{r1&&r2&&r3?'Save new password':'Meet the rules above'}</Button>
    </Shell>;}
  if(step==='verify')return <Shell label="Verify email" title="Verify your email" sub="One tap in your inbox and you're through." back={back('login')}>
    <div style={{display:'flex',justifyContent:'center',margin:'26px 0 6px'}}>
      <div className="dm-dots" style={{width:110,height:110,borderRadius:'50%',background:'var(--dm-sand)',display:'flex',alignItems:'center',justifyContent:'center'}}>
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--dm-ink)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="5.5" width="18" height="13" rx="2.5"/><path d="m4 7 8 6 8-6"/></svg>
      </div>
    </div>
    <span style={{textAlign:'center',font:'400 13px/19px var(--font-ui)',color:'var(--dm-ink-2)'}}>We emailed <b style={{color:'var(--dm-ink)'}}>faisal@example.com</b>. Wrong address? <button onClick={()=>setStep('login')} style={{appearance:'none',border:0,background:'none',cursor:'pointer',padding:0,font:'600 13px var(--font-ui)',color:'var(--dm-green-700)'}}>Change it</button></span>
    <div style={{flex:1}}/>
    <Button block size="lg" onClick={()=>setStep('done')}>I've verified (demo)</Button>
    <span style={{textAlign:'center',marginTop:12,font:'500 13px var(--font-ui)',color:'var(--dm-ink-2)'}}>Resend email</span>
  </Shell>;
  return <Shell label="Done" title="You're set, Faisal" sub="Signed in and secure — back to lunch." back={backLink}>
    <div style={{display:'flex',justifyContent:'center',margin:'30px 0 0'}}>
      <div style={{width:84,height:84,borderRadius:'50%',background:'var(--dm-pine-100)',display:'flex',alignItems:'center',justifyContent:'center'}}>
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--dm-pine-700)" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M4.5 12.5 10 18 19.5 6.5"/></svg>
      </div>
    </div>
    <div style={{flex:1}}/>
    <a href="./subscription-dashboard.html" style={{display:'block'}}><Button block size="lg" style={{width:'100%'}}>Go to my meals</Button></a>
  </Shell>;}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
