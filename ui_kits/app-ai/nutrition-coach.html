<!-- @dsCard group="App Screens (AI)" viewport="390x844" name="AI — Nutrition Coach" subtitle="Progress narrated in plain language, trade-offs negotiated ('pizza Friday? I'll balance Saturday'), corrections teach" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dailymealz AI — Coach</title>
<link rel="stylesheet" href="../../styles-ai.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
html,body{height:100%}
body{width:390px;height:844px;margin:0 auto;overflow:hidden}
#root,.app{height:100%;display:flex;flex-direction:column}
.scroll{flex:1;overflow-y:auto;padding:4px 18px 14px;scrollbar-width:none;display:flex;flex-direction:column;gap:13px}
.scroll::-webkit-scrollbar{display:none}
.card{background:var(--dm-surface);border:1px solid var(--dm-line);border-radius:16px;box-shadow:var(--sh-1);padding:13px}
.micro{font:600 var(--fs-micro)/var(--lh-micro) var(--font-ui);letter-spacing:.06em;text-transform:uppercase;color:var(--dm-ink-3)}
</style></head>
<body data-screen-label="AI — Nutrition Coach"><div id="root"></div>
<script type="text/babel">
const {Button,MacroChips}=window.DailymealzAppRedesignBrief_310f67;
const Mic=()=><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="3.5" width="6" height="10.5" rx="3"/><path d="M5.5 11.5a6.5 6.5 0 0 0 13 0M12 18v2.5"/></svg>;
const Send=()=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 18.5V6M6.5 11.5 12 6l5.5 5.5"/></svg>;
const Check=()=><svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M3 8.5 6.5 12 13 4.5"/></svg>;
function Att({children="Mealz"}){return <div className="ai-att"><i className="ai-dot"></i>{children}</div>;}
const DAYS=[{d:'S',v:1790,s:'done'},{d:'M',v:1860,s:'done'},{d:'T',v:1905,s:'over'},{d:'W',v:1240,s:'today'},{d:'T',v:0,s:'todo'},{d:'F',v:0,s:'todo'},{d:'S',v:0,s:'todo'}];
const MAX=2100,TARGET=1880;
function App(){
  const [locked,setLocked]=React.useState(false);
  return <div className="app">
    <div style={{padding:'16px 18px 10px',display:'flex',alignItems:'center',gap:10,borderBottom:'1px solid var(--dm-line)'}}>
      <a href="./daily-brief.html" aria-label="Back" style={{width:44,height:44,borderRadius:'50%',border:'1.5px solid var(--dm-line-strong)',background:'var(--dm-surface)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--dm-ink)',flex:'none'}}><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.5 4.5 7 10l5.5 5.5"/></svg></a>
      <div style={{flex:1,display:'flex',alignItems:'center',gap:8}}>
        <i className="ai-dot" style={{'--ai-dot-size':'12px'}}></i>
        <div><b style={{display:'block',font:'700 16px/20px var(--font-display)'}}>Mealz</b><span style={{font:'400 11px/14px var(--font-ui)',color:'var(--dm-ink-3)'}}>nutrition coach · same thread</span></div>
      </div>
      <a href="../app-green/nutrition-target.html" style={{font:'600 13px var(--font-ui)',color:'var(--dm-ink-2)'}}>My numbers</a>
    </div>
    <div className="scroll">
      <span style={{alignSelf:'center',font:'500 10.5px var(--font-ui)',color:'var(--dm-ink-3)'}}>Wednesday 8:41 PM</span>
      <span className="ai-user">how am I doing this week?</span>
      <div data-screen-label="Progress narration">
        <Att/>
        <p className="ai-msg" style={{marginTop:5}}>On pace. Three days in, you're averaging 1,850 against your 1,880 — protein's been carrying it. Tuesday ran a little hot; the week absorbs it.</p>
        <div className="card" style={{marginTop:9}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span className="micro">This week · kcal per day</span>
            <span style={{font:'600 10.5px var(--font-ui)',color:'var(--dm-ink-2)'}}>target 1,880</span>
          </div>
          <div style={{position:'relative',height:96,marginTop:10}}>
            <i style={{position:'absolute',insetInline:0,top:(1-TARGET/MAX)*96,borderTop:'1.5px dashed var(--dm-ink-3)'}}/>
            <div style={{display:'flex',gap:9,alignItems:'flex-end',height:'100%'}}>
              {DAYS.map((d,i)=><div key={i} style={{flex:1,display:'flex',flexDirection:'column',justifyContent:'flex-end',height:'100%'}}>
                {d.s==='todo'
                  ?<i style={{height:3,borderRadius:2,background:'var(--dm-sand-2)'}}/>
                  :<i style={{height:Math.round(d.v/MAX*96),borderRadius:'6px 6px 3px 3px',background:d.s==='today'?'var(--dm-green-500)':d.s==='over'?'var(--dm-amber-500)':'var(--dm-green-300)',opacity:d.s==='today'?1:.9}}/>}
              </div>)}
            </div>
            <div style={{display:'flex',gap:9,marginTop:5}}>{DAYS.map((d,i)=><span key={i} className="micro" style={{flex:1,textAlign:'center',color:d.s==='today'?'var(--dm-ink)':'var(--dm-ink-3)'}}>{d.d}</span>)}</div>
          </div>
          <div className="ai-why" style={{marginTop:14}}>delivered lunches + the dinners you logged — Wednesday is still counting</div>
        </div>
      </div>
      <span className="ai-user">pizza friday?</span>
      <div data-screen-label="Trade-off">
        <Att/>
        <p className="ai-msg" style={{marginTop:5}}>Deal — book it. I'll balance Saturday around it: lighter lunch, protein up.</p>
        <div className="card" style={{marginTop:9}}>
          <div style={{display:'flex',alignItems:'center',gap:10,padding:'2px 2px 10px',borderBottom:'1px dashed var(--dm-line)'}}>
            <span style={{background:'var(--dm-sand)',borderRadius:10,padding:'6px 10px',font:'700 12px var(--font-display)',flex:'none'}}>FRI</span>
            <div style={{flex:1}}><b style={{font:'600 13.5px/17px var(--font-display)'}}>Pizza night — yours</b><span style={{display:'block',font:'400 11px var(--font-ui)',color:'var(--dm-ink-3)'}}>≈ 950 kcal, no lunch delivery</span></div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10,paddingTop:10}}>
            <span style={{background:'var(--dm-green-100)',color:'var(--dm-green-700)',borderRadius:10,padding:'6px 10px',font:'700 12px var(--font-display)',flex:'none'}}>SAT</span>
            <div style={{flex:1,minWidth:0}}>
              <b style={{font:'600 13.5px/17px var(--font-display)'}}>Grilled Kofta Bowl</b>
              <span style={{display:'block',font:'500 11px var(--font-ui)',color:'var(--dm-ink-3)'}}>Nabta · was Chicken Mandi 690</span>
              <MacroChips kcal={520} protein={42} carbs={34} fat={22} size="sm" style={{marginTop:3}}/>
            </div>
          </div>
          <div className="ai-why" style={{marginTop:9}}>Saturday gives back −180 kcal and +12g protein — the week still lands on target</div>
          {locked
            ?<div style={{display:'flex',alignItems:'center',gap:8,marginTop:11}}><span className="ai-taught" style={{background:'var(--st-delivered-bg)',color:'var(--st-delivered-fg)'}}><Check/>Locked — enjoy Friday</span><button onClick={()=>setLocked(false)} style={{appearance:'none',border:0,background:'none',cursor:'pointer',font:'600 12px var(--font-ui)',color:'var(--dm-ink-2)'}}>Undo</button></div>
            :<div style={{display:'flex',gap:8,marginTop:11}}>
              <Button size="sm" onClick={()=>setLocked(true)}>Lock it in</Button>
              <Button variant="ghost" size="sm">Leave Saturday alone</Button>
            </div>}
        </div>
      </div>
      <span className="ai-user">and less chicken overall</span>
      <div data-screen-label="Teaching moment">
        <Att/>
        <p className="ai-msg" style={{marginTop:5}}>You're right — three of five days this week. Capping chicken at two a week from the next draft.</p>
        <div style={{display:'flex',alignItems:'center',gap:8,marginTop:8}}>
          <span className="ai-taught"><Check/>Saved to your taste — chicken ≤ 2 a week</span>
          <button style={{appearance:'none',border:0,background:'none',cursor:'pointer',font:'600 12px var(--font-ui)',color:'var(--dm-ink-2)'}}>Undo</button>
        </div>
      </div>
    </div>
    <div style={{padding:'6px 16px 22px'}} data-screen-label="Composer">
      <div className="ai-composer">
        <input placeholder="Ask about your week, macros, trade-offs…"/>
        <button className="ai-icbtn" aria-label="Voice"><Mic/></button>
        <button className="ai-icbtn send" aria-label="Send"><Send/></button>
      </div>
    </div>
  </div>;}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
