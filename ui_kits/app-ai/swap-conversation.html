<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dailymealz AI — Change anything</title>
<link rel="stylesheet" href="../../styles-ai.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
html,body{height:100%}
body{width:390px;height:844px;margin:0 auto;overflow:hidden}

.scroll{flex:1;overflow-y:auto;padding:4px 18px 14px;scrollbar-width:none;display:flex;flex-direction:column;gap:13px}

.card{background:var(--dm-surface);border:1px solid var(--dm-line);border-radius:16px;box-shadow:var(--sh-1);padding:13px}
.micro{font:600 var(--fs-micro)/var(--lh-micro) var(--font-ui);letter-spacing:.06em;text-transform:uppercase;color:var(--dm-ink-3)}
.ai-step .chk{color:var(--dm-pine-500)}

<body data-screen-label="AI — Natural-Language Swap"><div id="root"></div>
<script type="text/babel">
const {Button,MacroChips}=window.DailymealzAppRedesignBrief_310f67;
const Mic=()=><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="3.5" width="6" height="10.5" rx="3"/><path d="M5.5 11.5a6.5 6.5 0 0 0 13 0M12 18v2.5"/></svg>;
const Send=()=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 18.5V6M6.5 11.5 12 6l5.5 5.5"/></svg>;
const Check=()=><svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M3 8.5 6.5 12 13 4.5"/></svg>;
function Att({children="Mealz",time}){return <div className="ai-att"><i className="ai-dot"></i>{children}{time&&<span style={{fontWeight:500,letterSpacing:0,textTransform:'none'}}>· {time}</span>}</div>;}
const WEEK=[{d:'S',n:18,s:'done'},{d:'M',n:19,s:'set'},{d:'T',n:20,s:'set'},{d:'W',n:21,s:'set'},{d:'T',n:22,s:'skip'}];

  return <div className="app">
    <div style={{padding:'16px 18px 10px',display:'flex',alignItems:'center',gap:10,borderBottom:'1px solid var(--dm-line)'}}>

      <div style={{flex:1,display:'flex',alignItems:'center',gap:8}}>
        <i className="ai-dot" style={{'--ai-dot-size':'12px'}}></i>
        <div><b style={{display:'block',font:'700 16px/20px var(--font-display)'}}>Mealz</b><span style={{font:'400 11px/14px var(--font-ui)',color:'var(--dm-ink-3)'}}>ordering · coaching · support</span></div>
      </div>
      <a href="../app-green/meal-selection-calendar.html" style={{font:'600 13px var(--font-ui)',color:'var(--dm-ink-2)'}}>Manual swap</a>
    </div>
    <div className="scroll">
      <span style={{alignSelf:'center',font:'500 10.5px var(--font-ui)',color:'var(--dm-ink-3)'}}>Today 12:41 PM</span>
      <span className="ai-user">I'm traveling Thursday</span>
      <div data-screen-label="Skip confirmed">
        <Att/>
        <p className="ai-msg" style={{marginTop:5}}>Done — Thursday's skipped and 46 SAR is back in your wallet. The week now:</p>
        <div className="card" style={{marginTop:9}}>
          <div style={{display:'flex',gap:7}}>
            {WEEK.map((w,i)=><div key={i} style={{flex:1,borderRadius:12,padding:'7px 0',textAlign:'center',border:'1px solid var(--dm-line)',background:w.s==='skip'?'var(--dm-sand)':'var(--dm-surface)',opacity:w.s==='done'?.55:1}}>
              <span className="micro" style={{display:'block'}}>{w.d}</span>
              <b style={{font:'700 14px/18px var(--font-display)',textDecoration:w.s==='skip'?'line-through':'none',color:w.s==='skip'?'var(--dm-ink-3)':'var(--dm-ink)'}}>{w.n}</b>
              <span style={{display:'block',font:'600 8.5px var(--font-ui)',color:'var(--dm-ink-3)',marginTop:2}}>{w.s==='skip'?'skipped':w.s==='done'?'today':'set'}</span>
            </div>)}
          </div>
          <div className="ai-why" style={{marginTop:9}}>full credit — it's before Wednesday 9:00 PM</div>
          <div style={{display:'flex',gap:8,alignItems:'center',marginTop:10}}>
            <Button variant="ghost" size="sm">Undo</Button>
            <span style={{font:'400 10.5px var(--font-ui)',color:'var(--dm-ink-3)'}}>or say "actually, deliver to Jeddah"</span>
          </div>
        </div>
      </div>
      <span style={{alignSelf:'center',font:'500 10.5px var(--font-ui)',color:'var(--dm-ink-3)'}}>Today 3:20 PM</span>
      <div data-screen-label="Unavailable meal">
        <Att time="proactive"/>
        <p className="ai-msg" style={{marginTop:5}}>Nabta ran out of tomorrow's salmon. Closest match by your taste and macros — held for you unless you say otherwise:</p>
        <div className="card" style={{marginTop:9,border:'2px solid var(--dm-green-500)'}}>
          <div style={{display:'flex',gap:11,alignItems:'center'}}>
            <div className="dm-photo" style={{width:52,height:52,flex:'none'}}><span className="dm-photo-note" style={{fontSize:7}}>photo</span></div>
            <div style={{flex:1,minWidth:0}}>
              <b style={{display:'block',font:'600 14.5px/18px var(--font-display)'}}>Grilled Chicken Freekeh</b>
              <span style={{font:'500 11px var(--font-ui)',color:'var(--dm-ink-3)'}}>Wafra Kitchen</span>
              <MacroChips kcal={545} protein={41} carbs={44} fat={16} size="sm" style={{marginTop:3}}/>
            </div>
          </div>
          <div className="ai-why" style={{marginTop:9}}>protein within 3g of the salmon — and you rate Wafra ★5</div>
          <div style={{display:'flex',gap:8,marginTop:11,flexWrap:'wrap'}}>
            <Button size="sm">Keep the swap</Button>
            <Button variant="ghost" size="sm">See others</Button>
            <Button variant="ghost" size="sm">Talk to a human</Button>
          </div>
        </div>
      </div>
      <span className="ai-user">make tuesday lighter</span>
      <div data-screen-label="Thinking live">
        <div className="ai-att"><i className="ai-dot think"></i>Mealz is setting your table</div>
        <div style={{display:'flex',flexDirection:'column',gap:6,marginTop:8}}>
          <div className="ai-step"><span className="chk"><Check/></span>Reading Tuesday's menu at Nabta &amp; Wafra</div>
          <div className="ai-step"><span className="chk"><Check/></span>Under 550 kcal, protein kept for your gym day</div>
          <div className="ai-step"><i className="ai-dot think" style={{'--ai-dot-size':'7px'}}></i>Setting the table<span className="ai-caret"></span></div>
        </div>
      </div>
    </div>
    <div style={{padding:'6px 16px 22px'}} data-screen-label="Composer">
      <div className="ai-composer">
        <input placeholder="Type or speak — عربي or English"/>
        <button className="ai-icbtn" aria-label="Voice"><Mic/></button>
        <button className="ai-icbtn send" aria-label="Send"><Send/></button>
      </div>
    </div>
  </div>;}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
