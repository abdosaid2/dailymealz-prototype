<!-- @dsCard group="App Screens (AI)" viewport="390x844" name="AI — Conversational Intake" subtitle="Onboarding absorbs the calorie calculator: chips + four numbers in-thread, target and matched plan drafted" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dailymealz AI — Intake</title>
<link rel="stylesheet" href="../../styles-ai.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
html,body{height:100%}
body{width:390px;height:844px;margin:0 auto;overflow:hidden}
#root,.app{height:100%;display:flex;flex-direction:column}
.scroll{flex:1;overflow-y:auto;padding:4px 18px 14px;scrollbar-width:none;display:flex;flex-direction:column;gap:14px}
.scroll::-webkit-scrollbar{display:none}
.card{background:var(--dm-surface);border:1px solid var(--dm-line);border-radius:16px;box-shadow:var(--sh-1);padding:14px}
.micro{font:600 var(--fs-micro)/var(--lh-micro) var(--font-ui);letter-spacing:.06em;text-transform:uppercase;color:var(--dm-ink-3)}
.stp{display:flex;align-items:center;gap:2px;background:var(--dm-paper);border:1.5px solid var(--dm-line-strong);border-radius:var(--r-pill);padding:2px}
.stp button{appearance:none;border:0;background:none;cursor:pointer;width:36px;height:36px;border-radius:var(--r-pill);font:700 17px var(--font-ui);color:var(--dm-ink)}
.stp b{font:700 15px var(--font-display);min-width:58px;text-align:center;font-variant-numeric:tabular-nums}
.ai-step .chk{color:var(--dm-pine-500)}
@keyframes popin{from{transform:scale(.75);opacity:0}to{transform:none;opacity:1}}
</style></head>
<body data-screen-label="AI — Conversational Intake"><div id="root"></div>
<script type="text/babel">
const {Button,Chip}=window.DailymealzAppRedesignBrief_310f67;
const Mic=()=><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="3.5" width="6" height="10.5" rx="3"/><path d="M5.5 11.5a6.5 6.5 0 0 0 13 0M12 18v2.5"/></svg>;
const Send=()=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 18.5V6M6.5 11.5 12 6l5.5 5.5"/></svg>;
const Check=()=><svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M3 8.5 6.5 12 13 4.5"/></svg>;
function Att({children="Mealz"}){return <div className="ai-att"><i className="ai-dot"></i>{children}</div>;}
function Stepper({v,set,min,max,unit}){
  return <div className="stp">
    <button aria-label="Less" onClick={()=>set(Math.max(min,v-1))} style={{color:v>min?'var(--dm-ink)':'var(--dm-ink-3)'}}>−</button>
    <b>{v} <span style={{font:'600 10.5px var(--font-ui)',color:'var(--dm-ink-2)'}}>{unit}</span></b>
    <button aria-label="More" onClick={()=>set(Math.min(max,v+1))}>+</button>
  </div>;}
function App(){
  const [sex,setSex]=React.useState('m');
  const [age,setAge]=React.useState(36);
  const [h,setH]=React.useState(170);
  const [w,setW]=React.useState(78);
  const bmr=sex==='m'?10*w+6.25*h-5*age+5:10*w+6.25*h-5*age-161;
  const target=Math.round((bmr*1.4-450)/10)*10;
  const lunch=Math.round(target*.35/10)*10;
  const row={display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 0',borderBottom:'1px dashed var(--dm-line)'};
  return <div className="app">
    <div style={{padding:'16px 18px 12px',display:'flex',alignItems:'center',gap:10}}>
      <a href="../app-green/onboarding.html" aria-label="Back" style={{width:44,height:44,borderRadius:'50%',border:'1.5px solid var(--dm-line-strong)',background:'var(--dm-surface)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--dm-ink)',flex:'none'}}><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.5 4.5 7 10l5.5 5.5"/></svg></a>
      <div style={{flex:1,display:'flex',alignItems:'center',gap:8}}>
        <i className="ai-dot" style={{'--ai-dot-size':'12px'}}></i>
        <div><b style={{display:'block',font:'700 16px/20px var(--font-display)'}}>Mealz</b><span style={{font:'400 11px/14px var(--font-ui)',color:'var(--dm-ink-3)'}}>plans your lunches · you approve</span></div>
      </div>
      <a href="../app-green/home-plans.html" style={{font:'600 13px var(--font-ui)',color:'var(--dm-ink-2)'}}>Browse myself</a>
    </div>
    <div className="scroll">
      <div data-screen-label="Intro">
        <Att/>
        <p className="ai-msg" style={{marginTop:5}}>Salam — I'm Mealz. Tell me a little about your days, I'll draft your lunches every week, and nothing is ordered until you approve. First: what are we cooking toward?</p>
      </div>
      <span className="ai-user">Lose weight</span>
      <div data-screen-label="Four numbers">
        <Att/>
        <p className="ai-msg" style={{marginTop:5}}>Four quick numbers. They stay between us — kitchens never see them.</p>
        <div className="card" style={{marginTop:10,animation:'dm-serve var(--dur-serve) var(--ease-serve) both'}}>
          <div style={row}><span style={{font:'600 13.5px var(--font-ui)'}}>Sex</span>
            <div style={{display:'flex',gap:7}}><Chip selected={sex==='m'} onClick={()=>setSex('m')}>Male</Chip><Chip selected={sex==='f'} onClick={()=>setSex('f')}>Female</Chip></div></div>
          <div style={row}><span style={{font:'600 13.5px var(--font-ui)'}}>Age</span><Stepper v={age} set={setAge} min={16} max={80} unit="yrs"/></div>
          <div style={row}><span style={{font:'600 13.5px var(--font-ui)'}}>Height</span><Stepper v={h} set={setH} min={140} max={210} unit="cm"/></div>
          <div style={{...row,borderBottom:0}}><span style={{font:'600 13.5px var(--font-ui)'}}>Weight</span><Stepper v={w} set={setW} min={40} max={160} unit="kg"/></div>
        </div>
      </div>
      <div data-screen-label="Days question">
        <Att/>
        <p className="ai-msg" style={{marginTop:5}}>And your days — desk, on your feet, training?</p>
      </div>
      <span className="ai-user">desk job, but gym on tuesdays and thursdays</span>
      <span className="ai-taught"><Check/>Noted — gym Tue &amp; Thu</span>
      <div className="card" data-screen-label="Target hero" style={{textAlign:'center',padding:'18px 14px 16px'}}>
        <span className="micro">Your daily target</span>
        <div style={{display:'flex',alignItems:'baseline',gap:5,justifyContent:'center',animation:'popin .45s var(--ease-serve) both'}}>
          <b style={{font:'800 52px/58px var(--font-display)',fontVariantNumeric:'tabular-nums'}}>{target.toLocaleString()}</b>
          <span style={{font:'700 14px var(--font-ui)',color:'var(--dm-ink-2)'}}>kcal</span>
        </div>
        <span style={{font:'400 12.5px/18px var(--font-ui)',color:'var(--dm-ink-2)'}}>about <b style={{color:'var(--dm-ink)'}}>{lunch} kcal</b> of it belongs to lunch</span>
        <div className="ai-why" style={{justifyContent:'center',marginTop:9}}>Mifflin-St Jeor from your numbers — a steady pace, not a crash. Edit anytime above.</div>
      </div>
      <div data-screen-label="Hard rules">
        <Att/>
        <p className="ai-msg" style={{marginTop:5}}>Any hard rules? Tap or just type — Arabic works too.</p>
        <div style={{display:'flex',gap:7,flexWrap:'wrap',marginTop:9}}>
          <Chip>No beef</Chip><Chip selected>No lamb</Chip><Chip>No seafood</Chip><Chip>Low spice</Chip>
        </div>
      </div>
      <span className="ai-user">no lamb, and go easy on the rice</span>
      <span className="ai-taught"><Check/>Saved to your taste — no lamb · lighter rice</span>
      <div data-screen-label="Match">
        <Att>Mealz set your table</Att>
        <div style={{display:'flex',flexDirection:'column',gap:5,margin:'8px 0 2px'}}>
          <div className="ai-step" style={{color:'var(--dm-ink-3)'}}><span className="chk"><Check/></span>Matched 3 plans against your {lunch} kcal lunches</div>
          <div className="ai-step" style={{color:'var(--dm-ink-3)'}}><span className="chk"><Check/></span>Weighted protein onto Tue &amp; Thu, rice kept rare</div>
        </div>
        <div className="card" style={{marginTop:8}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span className="micro">The match</span>
            <span style={{background:'var(--dm-green-100)',color:'var(--dm-green-700)',borderRadius:'var(--r-pill)',padding:'3px 10px',font:'700 10.5px var(--font-ui)'}}>Fits your lunch budget</span>
          </div>
          <div style={{display:'flex',gap:12,alignItems:'center',marginTop:10}}>
            <div className="dm-photo" style={{width:52,height:52,flex:'none'}}><span className="dm-photo-note" style={{fontSize:7}}>photo</span></div>
            <div style={{flex:1,minWidth:0}}>
              <b style={{font:'700 16px/20px var(--font-display)'}}>Balanced · 20 lunches</b>
              <span style={{display:'block',font:'400 12px/16px var(--font-ui)',color:'var(--dm-ink-2)'}}>Mains average 600 kcal · 46 SAR/meal</span>
            </div>
          </div>
          <div className="ai-why" style={{marginTop:9}}>room for {lunch}-kcal lunches and bigger gym days — Light runs too small for your target</div>
          <div style={{display:'flex',gap:8,marginTop:12}}>
            <a href="./week-draft-review.html" style={{flex:1,display:'block'}}><Button block style={{width:'100%'}}>Draft my first week</Button></a>
            <a href="../app-green/home-plans.html" style={{display:'block'}}><Button variant="ghost">All plans</Button></a>
          </div>
        </div>
      </div>
    </div>
    <div style={{padding:'6px 16px 22px'}} data-screen-label="Composer">
      <div className="ai-composer">
        <input placeholder="Type or speak — عربي or English"/>
        <button className="ai-icbtn" aria-label="Voice"><Mic/></button>
        <button className="ai-icbtn send" aria-label="Send"><Send/></button>
      </div>
    </div>
  </div>;}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
