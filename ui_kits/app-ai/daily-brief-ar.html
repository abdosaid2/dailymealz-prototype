<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<style>
html,body{height:100%}

.card{background:var(--dm-surface);border:1px solid var(--dm-line);border-radius:var(--r-card);box-shadow:var(--sh-1);padding:16px;margin-top:12px;animation:dm-serve var(--dur-serve) var(--ease-serve) both}

<body data-screen-label="AI — Daily Brief (AR)"><div id="root"></div>
<script type="text/babel">
const {Button,StatusBadge,TabBar,MacroChips}=window.DailymealzAppRedesignBrief_310f67;
const Mic=()=><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="3.5" width="6" height="10.5" rx="3"/><path d="M5.5 11.5a6.5 6.5 0 0 0 13 0M12 18v2.5"/></svg>;
const Check=()=><svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M3 8.5 6.5 12 13 4.5"/></svg>;
function StatusBar(){return <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'14px 24px 6px',fontFamily:'var(--font-ui)',fontSize:14,fontWeight:600}}>
  <span>١٢:٠٤</span>
  <span style={{display:'flex',gap:5,alignItems:'center'}}>

  </span></div>;}

  return <div className="app">
    <div className="dm-dots" style={{background:'var(--dm-paper)'}}>
      <StatusBar/>
      <div style={{display:'flex',alignItems:'center',gap:12,padding:'10px 20px 14px'}}>

    </div>
    <div className="scroll">
      <section className="card" style={{marginTop:2}} data-screen-label="ملخص اليوم">

        </div>
        <p className="ai-msg" style={{margin:'8px 0 0',font:'400 13.5px/20px var(--font-ui)'}}>الكبسة تبعد نحو ٢٥ دقيقة. قرار واحد متى ما جهزت — الغد يُقفل الساعة ٩:٠٠ م.</p>
        <div style={{display:'flex',alignItems:'baseline',gap:8,marginTop:10}}>
          <b dir="ltr" style={{font:'700 30px/36px var(--font-display)',unicodeBidi:'isolate'}}>١٢:١٥–١٢:٤٥</b>
        </div>
        <div style={{borderTop:'1px dashed var(--dm-line)',marginTop:10,paddingTop:11,display:'flex',gap:11,alignItems:'center'}}>

          <div style={{flex:1,minWidth:0}}>
            <b style={{display:'block',font:'600 15px/20px var(--font-display)'}}>كبسة دجاج</b>
            <span style={{font:'500 11px var(--font-ui)',color:'var(--dm-ink-3)'}}>مطبخ وفرة · أحمد في الطريق</span>
          </div>
          <a href="../app-green/subscription-dashboard-ar.html" style={{display:'block'}}><Button variant="secondary" size="sm">تتبّع</Button></a>
        </div>
      </section>
      <section className="card" style={{animationDelay:'40ms'}} data-screen-label="قرار الغد">

          <span className="micro" style={{fontWeight:700}}>الغد · الاثنين ١٩</span>

        </div>
        <div style={{display:'flex',gap:11,alignItems:'center',marginTop:12}}>
          <div className="dm-photo" style={{width:56,height:56,flex:'none'}}><span className="dm-photo-note" style={{fontSize:7}}>photo</span></div>
          <div style={{flex:1,minWidth:0}}>
            <b style={{display:'block',font:'600 15px/20px var(--font-display)'}}>سلمون مشوي مع فريكة</b>
            <span style={{font:'500 11px var(--font-ui)',color:'var(--dm-ink-3)'}}>نبتة</span>
            <MacroChips kcal={528} protein={34} carbs={41} fat={22} locale="ar" size="sm" style={{marginTop:3}}/>
          </div>
        </div>
        <div className="ai-why" style={{marginTop:9}}>قيّمته ★٥ في ٦ يناير — والاثنين عادةً يومك الأخف</div>
        {kept

          :<div style={{display:'flex',gap:8,marginTop:12}}>
            <Button size="sm" onClick={()=>setKept(true)}>خلّه</Button>
            <a href="./swap-conversation.html" style={{display:'block'}}><Button variant="ghost" size="sm">٣ بدائل</Button></a>

      </section>
      <section className="card" style={{animationDelay:'80ms',display:'flex',alignItems:'center',gap:12,padding:'13px 16px'}} data-screen-label="سطر المدرب">
        <div style={{flex:1,minWidth:0}}>
          <b style={{font:'600 13.5px/19px var(--font-display)'}}>٣ من ٣ أيام ضمن الهدف</b>

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',margin:'16px 2px 0'}} data-screen-label="شريط الأسبوع">

      <div style={{display:'flex',gap:8,marginTop:9}}>

          <b style={{font:'700 15px/19px var(--font-display)'}}>{w.n}</b>
          {w.s==='today'

      <span style={{display:'block',font:'400 11px/16px var(--font-ui)',color:'var(--dm-ink-3)',margin:'8px 2px 0'}}>متبقي ١٢ غداء · يتجدد ٤ فبراير · <a href="../app-green/subscription-manage-ar.html" style={{font:'600 11px var(--font-ui)'}}>إدارة</a></span>
    </div>
    <div style={{padding:'6px 16px 8px'}} data-screen-label="حقل المحادثة">
      <a href="./swap-conversation.html" style={{display:'block',color:'inherit'}}>
        <div className="ai-composer">
          <span className="ai-icbtn send" aria-hidden="true"><Mic/></span>
          <input readOnly placeholder="اسأل أو غيّر أي شيء — «تخطَّ الخميس»…" style={{cursor:'pointer'}}/>
        </div>
      </a>
    </div>
    <TabBar active="subs" locale="ar"/>
  </div>;}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
